<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yandex Saver</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#fc3f1d">
  <style>
    :root{--bg:#f5f7fa;--card:#fff;--primary:#fc3f1d;--text:#333;--border:#e0e0e0;--error:#f44336;--success:#4caf50}
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body{background:var(--bg);color:var(--text);padding:20px;min-height:100vh;display:flex;justify-content:center}
    .container{max-width:600px;width:100%;background:var(--card);padding:24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .header-icon{width:48px;height:48px}
    h1{font-size:1.5rem}
    .step{display:none;margin-top:20px}
    .step.active{display:block}
    label{display:block;margin-bottom:6px;font-weight:500}
    input,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
    button{background:var(--primary);color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;width:100%;margin-bottom:8px}
    button:hover{background:#e6300f}
    .hint{font-size:.85rem;color:#666;margin-bottom:12px}
    .error-box{background:#ffebee;color:#c62828;padding:16px;border-radius:8px;margin:12px 0}
    .error-box code{background:#ffcdd2;padding:2px 6px;border-radius:4px;font-family:monospace}
    .log{background:#111;color:#0f0;padding:12px;border-radius:8px;font-family:monospace;font-size:.85rem;height:250px;overflow-y:auto;margin-top:16px;white-space:pre-wrap}
    .user-info{display:flex;justify-content:space-between;padding:10px;background:#f9f9f9;border-radius:8px;margin-bottom:16px}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="favicon.svg" alt="Icon" class="header-icon">
      <h1>Yandex Saver</h1>
    </div>
    <div class="hint">Сохранение файлов на ваш Яндекс.Диск</div>

    <div id="user-block" class="user-info" style="display:none;">
      <span>✅ Подключено</span>
      <button onclick="logout()" style="width:auto;background:var(--error)">Выйти</button>
    </div>

    <div id="step-auth" class="step active">
      <label>1. Подключите Яндекс.Диск</label>
      <button onclick="startOAuth()">🔑 Подключить</button>
      <div id="error-container"></div>
    </div>

    <div id="step-folder" class="step">
      <label>2. Папка</label>
      <input type="text" id="folder-input" value="/saved-materials">
      <button onclick="validateFolder()">Проверить</button>
      <div id="folder-status" class="hint"></div>
      <button id="btn-next" style="display:none;margin-top:12px;" onclick="goToStep('step-links')">Далее →</button>
    </div>

    <div id="step-links" class="step">
      <label>3. Ссылки</label>
      <textarea id="links-input" rows="6" placeholder="https://disk.yandex.ru/i/..."></textarea>
      <button onclick="startProcess()">🚀 Начать</button>
      <div class="log" id="log" style="display:none;"></div>
    </div>
  </div>

  <script>

    const REDIRECT_URI = 'https://medushenko.github.io/Yandex-Saver/';
    const API = 'https://cloud-api.yandex.net/v1/disk';
    let TOKEN = sessionStorage.getItem('ydisk_token') || '';
    let TARGET_FOLDER = '';
