<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex Saver v_1.1 </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Yandex Saver</h1>
        
        <!-- Секция авторизации -->
        <div id="auth-section">
            <button id="login-btn" class="btn">Авторизоваться</button>
            <button id="logout-btn" class="btn hidden">Выйти</button>
            <div id="auth-status">
                <p id="auth-message">Ожидание авторизации...</p>
            </div>
        </div>

        <!-- Остальной HTML код -->
    </div>

    <script>
        class YandexSaver {
            constructor() {
                this.clientId = 'a0731d71573f4d0a8e40b05760f1badb'; // ВАЖНО: замените на ваш реальный Client ID
                this.redirectUri = 'https://medushenko.github.io/Yandex-Saver/callback.html';
                this.authUrl = 'https://oauth.yandex.ru/authorize';
                this.tokenUrl = 'https://oauth.yandex.ru/token';
                this.diskApiUrl = 'https://cloud-api.yandex.net/v1/disk';
                
                this.init();
            }

            init() {
                // Проверяем, загружены ли все DOM-элементы
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', () => this.bindEvents());
                } else {
                    this.bindEvents();
                }
            }

            bindEvents() {
                // Добавляем обработчики событий
                document.addEventListener('DOMContentLoaded', () => {
                    document.getElementById('login-btn').addEventListener('click', () => this.loginWithPopup());
                    document.getElementById('logout-btn').addEventListener('click', () => this.logout());
                });
            }

            loginWithPopup() {
                console.log('Кнопка авторизации нажата'); // Отладка
                
                const authParams = new URLSearchParams({
                    response_type: 'code',
                    client_id: this.clientId,
                    redirect_uri: this.redirectUri
                });

                const popupUrl = `${this.authUrl}?${authParams}`;
                this.openPopup(popupUrl);
            }

            openPopup(url) {
                this.popup = window.open(
                    url, 
                    'YandexAuthPopup', 
                    'width=600,height=700,left=100,top=100,resizable=yes,scrollbars=yes'
                );

                if (!this.popup) {
                    alert('Разрешите всплывающие окна в браузере');
                }
            }

            setupMessageListener() {
                window.addEventListener('message', (event) => {
                    if (event.origin !== window.location.origin) return;
                    
                    const data = event.data;
                    if (data.type === 'YANDEX_AUTH_SUCCESS') {
                        this.handleAuthSuccess(data.code);
                        this.closePopup();
                    }
                });
            }

            async handleAuthSuccess(code) {
                try {
                    const tokenData = await this.getAccessToken(code);
                    this.saveAuthData(tokenData);
                    this.showUserInfo();
                } catch (error) {
                    console.error('Ошибка авторизации:', error);
                }
            }

            // Остальные методы...
        }

        // Создаем экземпляр класса при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            new YandexSaver();
        });
    </script>
</body>
</html>
