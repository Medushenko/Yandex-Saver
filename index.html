<script>
  // ---------- КОНФИГУРАЦИЯ ----------
  const CLIENT_ID = 'a0731d71573f4d0a8e40b05760f1badb';
  const REDIRECT_URI = 'https://medushenko.github.io/Yandex-Saver/';
  const API = 'https://cloud-api.yandex.net/v1/disk';
  let TOKEN = sessionStorage.getItem('ydisk_token') || '';
  let TARGET_FOLDER = '';
  let isRunning = false;
  let abortController = null;
  let popup = null;
  let popupTimer = null;                          // ИСПРАВЛЕНО: таймер для очистки
  let processedPublicKeys = new Set();

  // ---------- POPUP АВТОРИЗАЦИЯ ----------
  function startOAuthPopup() {
    updateStatus('Открытие окна авторизации...');
    const url = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    const width = 600, height = 700;
    const left = (screen.width - width) / 2;
    const top = (screen.height - height) / 2;
    popup = window.open(url, 'YandexAuth', `width=${width},height=${height},left=${left},top=${top}`);
    if (!popup) {
      updateStatus('Ошибка: разрешите всплывающие окна');
      addLog('❌ Браузер заблокировал всплывающее окно');
      return;
    }
    window.addEventListener('message', receiveTokenFromPopup);
    // ИСПРАВЛЕНО: сохраняем таймер для очистки
    popupTimer = setTimeout(() => {
      if (popup && !popup.closed) {
        popup.close();
        updateStatus('Авторизация отменена (таймаут)');
        window.removeEventListener('message', receiveTokenFromPopup);
      }
      popupTimer = null;
    }, 5 * 60 * 1000);
  }

  function receiveTokenFromPopup(event) {
    if (event.origin !== window.location.origin) return;
    if (event.data && event.data.type === 'yandex_token') {
      // ИСПРАВЛЕНО: очищаем таймер
      if (popupTimer) {
        clearTimeout(popupTimer);
        popupTimer = null;
      }
      const token = event.data.token;
      if (token) {
        addLog('🔑 Токен получен, проверяем...');
        verifyTokenAndProceed(token);
      } else {
        addLog('❌ Токен не получен');
        updateStatus('Ошибка авторизации');
      }
      if (popup && !popup.closed) popup.close();
      window.removeEventListener('message', receiveTokenFromPopup);
    }
  }

  if (window.opener && window.location.hash.includes('access_token=')) {
    const match = window.location.hash.match(/access_token=([^&]+)/);
    if (match) {
      const token = decodeURIComponent(match[1]);
      window.opener.postMessage({ type: 'yandex_token', token: token }, window.location.origin);
      window.close();
    }
  }

  async function verifyTokenAndProceed(token) {
    updateStatus('Проверка токена...');
    try {
      const test = await fetch(`${API}/`, { headers: { 'Authorization': `OAuth ${token}` } });
      if (test.ok) {
        TOKEN = token;
        sessionStorage.setItem('ydisk_token', TOKEN);
        addLog('✅ Токен действителен');
        onAuthSuccess();
      } else {
        addLog('❌ Токен недействителен');
        logout();
      }
    } catch (e) {
      addLog(`Ошибка проверки: ${e.message}`);
      logout();
    }
  }

  // ---------- ЗАГРУЗКА ----------
  window.addEventListener('DOMContentLoaded', async () => {
    if (TOKEN) {
      addLog('Найден сохранённый токен, проверяем...');
      await verifyTokenAndProceed(TOKEN);
    } else {
      addLog('Требуется авторизация');
      updateStatus('Не авторизован');
    }
    document.getElementById('authPopupBtn').addEventListener('click', startOAuthPopup);
    document.getElementById('browseFolderBtn').addEventListener('click', showFolderBrowser);
    document.getElementById('copyLogBtn').addEventListener('click', copyLog);
  });

  function copyLog() {
    const logText = document.getElementById('log').innerText;
    if (!logText) {
      alert('Лог пуст');
      return;
    }
    navigator.clipboard.writeText(logText).then(() => {
      addLog('📋 Лог скопирован в буфер обмена');
    }).catch(() => {
      alert('Не удалось скопировать лог');
    });
  }

  function onAuthSuccess() {
    showMessage('success', '✅ Яндекс.Диск подключён');
    document.getElementById('user-block').style.display = 'flex';
    updateStatus('Авторизация успешна');
    goToStep('step-folder');
  }

  function goToStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showMessage(type, text) {
    const div = document.createElement('div');
    div.className = type === 'error' ? 'error-box' : 'success-box';
    div.textContent = text;
    const container = document.getElementById('auth-message');
    container.innerHTML = '';
    container.appendChild(div);
    setTimeout(() => div.remove(), 5000);
  }

  function updateStatus(msg) {
    document.getElementById('current-status').innerText = msg;
  }

  function addLog(msg) {
    const el = document.getElementById('log');
    el.style.display = 'block';
    const time = new Date().toLocaleTimeString('ru-RU');
    el.textContent += `[${time}] ${msg}\n`;
    el.scrollTop = el.scrollHeight;
    console.log(msg);
  }

  function logout() {
    TOKEN = '';
    sessionStorage.removeItem('ydisk_token');
    document.getElementById('user-block').style.display = 'none';
    document.getElementById('log').innerHTML = '';
    updateStatus('Вы вышли');
    goToStep('step-auth');
    addLog('🔓 Вы вышли из аккаунта');
  }

  // ---------- ВЫБОР ПАПКИ (БРАУЗЕР) ----------
  let currentBrowsePath = '/';
  const folderBrowserDiv = document.getElementById('folder-browser');

  async function showFolderBrowser() {
    let currentPath = document.getElementById('folder-input').value.trim();
    if (!currentPath || currentPath === '/') currentPath = '/';
    if (!currentPath.startsWith('/')) currentPath = '/' + currentPath;
    currentBrowsePath = currentPath;
    await loadFolderContents(currentBrowsePath);
    folderBrowserDiv.style.display = 'block';
  }

  async function loadFolderContents(path) {
    folderBrowserDiv.innerHTML = '<div>Загрузка...</div>';
    try {
      const res = await fetch(`${API}/resources?path=${encodeURIComponent(path)}&limit=1000`, {
        headers: { 'Authorization': `OAuth ${TOKEN}` }
      });
      if (!res.ok) throw new Error(`Ошибка ${res.status}`);
      const data = await res.json();
      const items = data._embedded?.items || [];
      const folders = items.filter(i => i.type === 'dir');
      folderBrowserDiv.innerHTML = '';
      if (path !== '/') {
        const parentPath = path.substring(0, path.lastIndexOf('/')) || '/';
        const upDiv = document.createElement('div');
        upDiv.className = 'folder-item';
        upDiv.innerHTML = '<span>📁 ..</span><span class="name">Вверх</span>';
        upDiv.onclick = () => loadFolderContents(parentPath);
        folderBrowserDiv.appendChild(upDiv);
      }
      for (const f of folders) {
        const div = document.createElement('div');
        div.className = 'folder-item';
        div.innerHTML = `<span>📁</span><span class="name">${f.name}</span>`;
        div.onclick = () => {
          const newPath = path === '/' ? `/${f.name}` : `${path}/${f.name}`;
          loadFolderContents(newPath);
        };
        folderBrowserDiv.appendChild(div);
      }
      const selectBtn = document.createElement('button');
      selectBtn.textContent = `✅ Выбрать эту папку: ${path}`;
      selectBtn.className = 'new-folder-btn';
      selectBtn.onclick = () => {
        document.getElementById('folder-input').value = path;
        folderBrowserDiv.style.display = 'none';
        validateAndCreateFolder();
      };
      folderBrowserDiv.appendChild(selectBtn);
      const newBtn = document.createElement('button');
      newBtn.textContent = '+ Создать папку';
      newBtn.className = 'new-folder-btn';
      newBtn.onclick = () => showNewFolderModal(path);
      folderBrowserDiv.appendChild(newBtn);
    } catch (e) {
      folderBrowserDiv.innerHTML = `<div>Ошибка: ${e.message}</div>`;
    }
  }

  function showNewFolderModal(parentPath) {
    const modal = document.getElementById('newFolderModal');
    const input = document.getElementById('newFolderName');
    input.value = '';
    modal.style.display = 'flex';
    document.getElementById('confirmNewFolderBtn').onclick = async () => {
      const name = input.value.trim();
      if (!name) return;
      const newPath = parentPath === '/' ? `/${name}` : `${parentPath}/${name}`;
      try {
        const res = await fetch(`${API}/resources?path=${encodeURIComponent(newPath)}`, {
          method: 'PUT',
          headers: { 'Authorization': `OAuth ${TOKEN}` }
        });
        if (res.status === 201 || res.status === 200) {
          addLog(`📁 Папка создана: ${newPath}`);
          await loadFolderContents(parentPath);
        } else if (res.status === 409) {
          addLog(`⚠️ Папка "${newPath}" уже существует`);
        } else {
          addLog(`❌ Ошибка создания: ${res.status}`);
        }
      } catch (e) {
        addLog(`❌ Ошибка: ${e.message}`);
      } finally {
        modal.style.display = 'none';
      }
    };
    document.getElementById('cancelNewFolderBtn').onclick = () => {
      modal.style.display = 'none';
    };
  }

  // ---------- ПРОВЕРКА/СОЗДАНИЕ ПАПКИ ----------
  async function validateAndCreateFolder() {
    let input = document.getElementById('folder-input').value.trim();
    if (!input || input === '/') {
      input = '/saved-materials';
      document.getElementById('folder-input').value = input;
      addLog(`⚠️ Путь не указан, используем по умолчанию: ${input}`);
    }
    TARGET_FOLDER = input.startsWith('/') ? input : '/' + input;
    addLog(`📁 Проверка/создание папки: ${TARGET_FOLDER}`);
    updateStatus(`Проверка папки...`);
    try {
      const res = await fetch(`${API}/resources?path=${encodeURIComponent(TARGET_FOLDER)}`, {
        headers: { 'Authorization': `OAuth ${TOKEN}` }
      });
      if (res.status === 404) {
        addLog('Папка не найдена, создаю...');
        // ИСПРАВЛЕНО: добавлен mkdir для создания промежуточных папок (необязательно для PUT папки, но безопасно)
        const createRes = await fetch(`${API}/resources?path=${encodeURIComponent(TARGET_FOLDER)}`, {
          method: 'PUT',
          headers: { 'Authorization': `OAuth ${TOKEN}` }
        });
        if (!createRes.ok) {
          if (createRes.status === 409) {
            addLog('⚠️ Папка уже существует (возможно, была создана параллельно)');
          } else {
            throw new Error(`Не удалось создать папку (${createRes.status})`);
          }
        } else {
          addLog('✅ Папка создана');
        }
      } else if (!res.ok) throw new Error(`Ошибка ${res.status}`);
      else addLog('✅ Папка уже существует');
      document.getElementById('folder-status').innerHTML = `✅ Готово: ${TARGET_FOLDER}`;
      document.getElementById('btn-next-links').style.display = 'block';
      updateStatus(`Папка готова: ${TARGET_FOLDER}`);
    } catch (e) {
      document.getElementById('folder-status').innerHTML = `❌ ${e.message}`;
      addLog(`❌ Ошибка: ${e.message}`);
      updateStatus(`Ошибка: ${e.message}`);
    }
  }

  // ---------- ИЗВЛЕЧЕНИЕ ПУБЛИЧНЫХ ССЫЛОК (УЛУЧШЕНО) ----------
  function extractAllPublicLinks(text) {
    // ИСПРАВЛЕНО: используем URL API для надёжного извлечения ключа
    const urlRegex = /https?:\/\/(?:disk\.yandex\.ru|yadi\.sk)\/[^\s]+/gi;
    const urls = text.match(urlRegex) || [];
    const keys = new Set();
    for (const rawUrl of urls) {
      try {
        const url = new URL(rawUrl);
        const pathParts = url.pathname.split('/');
        // ищем сегмент 'i' или 'd', следующий за ними — публичный ключ
        const idx = pathParts.findIndex(part => part === 'i' || part === 'd');
        if (idx !== -1 && pathParts[idx+1]) {
          const key = pathParts[idx+1];
          addLog(`🔍 Извлечён ключ: ${key} из URL: ${rawUrl}`);
          keys.add(key);
        } else {
          addLog(`⚠️ Не удалось извлечь ключ из URL: ${rawUrl}`);
        }
      } catch (e) {
        addLog(`⚠️ Ошибка парсинга URL: ${rawUrl}`);
      }
    }
    return Array.from(keys);
  }

  // ---------- ОБРАБОТКА РЕСУРСОВ ----------
  async function ensureFolder(path) {
    const res = await fetch(`${API}/resources?path=${encodeURIComponent(path)}`, {
      headers: { 'Authorization': `OAuth ${TOKEN}` }
    });
    if (res.status === 404) {
      // ИСПРАВЛЕНО: добавляем mkdir для вложенных папок
      const create = await fetch(`${API}/resources?path=${encodeURIComponent(path)}&mkdir=true`, {
        method: 'PUT',
        headers: { 'Authorization': `OAuth ${TOKEN}` }
      });
      if (!create.ok) throw new Error(`Не удалось создать папку ${path} (${create.status})`);
      addLog(`📁 Создана папка: ${path}`);
    } else if (!res.ok) throw new Error(`Ошибка проверки папки ${path}: ${res.status}`);
  }

  async function saveFile(publicKey, targetPath, fileName) {
    const headers = { 'Authorization': `OAuth ${TOKEN}` };
    updateStatus(`Скачивание: ${fileName}`);
    addLog(`📥 Скачивание файла: ${fileName}`);
    const dlInfo = await fetch(`${API}/public/resources/download?public_key=${encodeURIComponent(publicKey)}`, { headers, signal: abortController?.signal });
    if (!dlInfo.ok) throw new Error(`Не удалось получить ссылку на скачивание: ${dlInfo.status}`);
    const dlData = await dlInfo.json();
    const fileResp = await fetch(dlData.href, { signal: abortController?.signal });
    if (!fileResp.ok) throw new Error('Ошибка скачивания файла');
    const blob = await fileResp.blob();
    const fullPath = `${targetPath}/${fileName}`;
    updateStatus(`Загрузка на Диск: ${fullPath}`);
    const uploadReq = await fetch(`${API}/resources/upload?path=${encodeURIComponent(fullPath)}&overwrite=true&mkdir=true`, {
      method: 'POST', headers, signal: abortController?.signal
    });
    if (!uploadReq.ok) throw new Error(`Не удалось получить URL загрузки: ${uploadReq.status}`);
    const uploadUrl = (await uploadReq.json()).href;
    const putRes = await fetch(uploadUrl, { method: 'PUT', body: blob, signal: abortController?.signal });
    if (!putRes.ok) throw new Error(`Ошибка загрузки: ${putRes.status}`);
    addLog(`✅ Файл сохранён: ${fullPath}`);
  }

  async function processFolder(publicKey, targetPath) {
    if (!isRunning) throw new Error('Остановлено');
    if (processedPublicKeys.has(publicKey)) {
      addLog(`⚠️ Папка с ключом ${publicKey.substring(0, 20)}... уже обработана, пропускаем (цикл)`);
      return;
    }
    processedPublicKeys.add(publicKey);
    addLog(`📂 Обработка папки: ${targetPath}`);
    updateStatus(`Обработка папки: ${targetPath}`);
    await ensureFolder(targetPath);

    let url = `${API}/public/resources?public_key=${encodeURIComponent(publicKey)}&limit=1000`;
    let hasMore = true;
    while (hasMore && isRunning) {
      addLog(`🔍 Запрос к API: ${url.substring(0, 100)}...`);
      const resp = await fetch(url, { headers: { 'Authorization': `OAuth ${TOKEN}` }, signal: abortController?.signal });
      if (!resp.ok) throw new Error(`Не удалось получить содержимое папки: ${resp.status}`);
      const data = await resp.json();
      const items = data._embedded?.items || [];
      const fileCount = items.filter(i => i.type === 'file').length;
      const dirCount = items.filter(i => i.type === 'dir').length;
      addLog(`📊 В папке найдено: ${fileCount} файлов, ${dirCount} подпапок`);
      if (items.length === 0) {
        addLog(`⚠️ Папка пуста.`);
      }
      for (const item of items) {
        if (!isRunning) throw new Error('Остановлено');
        if (item.type === 'file') {
          if (!item.public_key) {
            addLog(`⚠️ У файла ${item.name} нет public_key, пропускаем.`);
            continue;
          }
          await saveFile(item.public_key, targetPath, item.name);
        } else if (item.type === 'dir') {
          if (item.public_key === publicKey) {
            addLog(`⚠️ Обнаружена циклическая ссылка на папку ${item.name}, пропускаем`);
            continue;
          }
          await processFolder(item.public_key, `${targetPath}/${item.name}`);
        } else {
          addLog(`⚠️ Неизвестный элемент в папке: ${JSON.stringify(item)}`);
        }
      }
      // ИСПРАВЛЕНО: используем next из ответа для правильной пагинации
      hasMore = !!(data._embedded?.next || data.next);
      url = data._embedded?.next || data.next || '';
      if (hasMore && !url) {
        addLog(`⚠️ Ошибка пагинации: нет URL следующей страницы`);
        break;
      }
    }
  }

  async function processPublicLink(publicKey, targetPath) {
    if (processedPublicKeys.has(publicKey)) {
      addLog(`⚠️ Ресурс с ключом ${publicKey.substring(0,20)}... уже обработан, пропускаем`);
      return;
    }
    const metaResp = await fetch(`${API}/public/resources?public_key=${encodeURIComponent(publicKey)}`, {
      headers: { 'Authorization': `OAuth ${TOKEN}` }, signal: abortController?.signal
    });
    if (!metaResp.ok) {
      addLog(`⚠️ Ошибка получения информации (${metaResp.status}) для ключа ${publicKey}`);
      return;
    }
    const meta = await metaResp.json();
    processedPublicKeys.add(publicKey); // помечаем как обработанный
    if (meta.type === 'file') {
      await saveFile(publicKey, targetPath, meta.name);
    } else if (meta.type === 'dir') {
      await processFolder(publicKey, targetPath);
    } else if (meta._embedded?.items || meta.items) {
      addLog(`📂 Обнаружена папка (по наличию items) для ключа ${publicKey}`);
      await processFolder(publicKey, targetPath);
    } else {
      addLog(`⚠️ Неизвестный тип ресурса для ключа ${publicKey}`);
      addLog(`   Ответ API: ${JSON.stringify(meta).substring(0, 200)}...`);
    }
  }

  // ---------- ОСНОВНОЙ ПРОЦЕСС ----------
  async function startProcess() {
    const raw = document.getElementById('links-input').value.trim();
    if (!raw) return alert('Вставьте текст со ссылками');
    const keys = extractAllPublicLinks(raw);
    if (!keys.length) return alert('Не найдено ни одной публичной ссылки на Яндекс.Диск');

    if (!TARGET_FOLDER) {
      await validateAndCreateFolder();
      if (!TARGET_FOLDER) return alert('Сначала выберите папку назначения');
    }

    isRunning = true;
    abortController = new AbortController();
    processedPublicKeys.clear();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').style.display = 'block';
    addLog(`🚀 Найдено уникальных ресурсов: ${keys.length}`);
    updateStatus(`Начинаем обработку...`);

    let success = 0;
    for (let i = 0; i < keys.length; i++) {
      if (!isRunning) break;
      document.getElementById('progress-text').innerText = `${i+1}/${keys.length}`;
      document.getElementById('progress-fill').style.width = `${(i/keys.length)*100}%`;
      try {
        await processPublicLink(keys[i], TARGET_FOLDER);
        success++;
      } catch (e) {
        // ИСПРАВЛЕНО: отдельная обработка AbortError
        if (e.name === 'AbortError' || e.message === 'Остановлено') {
          addLog('⏹ Остановлено пользователем');
          break;
        }
        addLog(`❌ Ошибка #${i+1}: ${e.message}`);
        updateStatus(`Ошибка: ${e.message}`);
      }
      await new Promise(r => setTimeout(r, 1000));
    }
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-text').innerText = `✅ Готово: ${success}/${keys.length}`;
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').style.display = 'none';
    isRunning = false;
    updateStatus(success === keys.length ? 'Завершено успешно' : 'Завершено с ошибками');
  }

  function stopProcess() {
    isRunning = false;
    if (abortController) abortController.abort();
    addLog('⏹ Остановка по запросу');
    updateStatus('Остановка...');
  }
</script>
