<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex Saver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Yandex Saver</h1>
        
        <!-- Секция авторизации -->
        <div id="auth-section">
            <button id="login-btn" class="btn">Авторизоваться</button>
            <button id="logout-btn" class="btn hidden">Выйти</button>
            <div id="auth-status">
                <p id="auth-message">Ожидание авторизации...</p>
            </div>
        </div>

        <!-- Секция выбора папки -->
        <div id="folder-section" class="hidden">
            <h2>Папка назначения</h2>
            <div id="folder-info">
                <p>Текущая папка: <span id="current-folder">/saved-materials</span></p>
                <button id="folder-browse" class="btn">Обзор папок</button>
            </div>
        </div>

        <!-- Секция вставки ссылок -->
        <div id="links-section" class="hidden">
            <h2>Вставка ссылок</h2>
            <textarea id="links-input" placeholder="Вставьте ссылки сюда..." rows="10"></textarea>
            <div id="file-upload">
                <input type="file" id="file-input" accept=".txt,.md,.html,.json" hidden>
                <button onclick="document.getElementById('file-input').click()" class="btn">
                    Загрузить файл со ссылками
                </button>
            </div>
            <p>Загружено ссылок: <span id="links-count">0</span></p>
        </div>

        <!-- Секция обработки -->
        <div id="processing-section" class="hidden">
            <h2>Обработка</h2>
            <button id="start-save" class="btn">Начать сохранение</button>
            <button id="stop-process" class="btn">Остановить</button>
            <button id="download-report" class="btn">Скачать отчет</button>
            <p id="processing-status">Статус: Ожидание</p>
        </div>
    </div>

    <!-- Модальное окно для выбора папки -->
    <div id="folder-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Выбор папки</h3>
            <button id="close-modal" class="close-btn">×</button>
            <div id="folder-tree">
                <!-- Здесь будет отображаться структура папок -->
            </div>
            <div class="modal-footer">
                <button id="create-folder" class="btn">Создать папку</button>
                <button id="select-folder" class="btn">Выбрать</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
