<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yandex Saver - Сохранение на Яндекс.Диск</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root{--bg:#f5f7fa;--card:#fff;--primary:#fc3f1d;--primary-hover:#e6300f;--text:#333;--text-light:#666;--border:#e0e0e0;--success:#4caf50;--error:#f44336}
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body{background:var(--bg);color:var(--text);padding:20px;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
    .container{max-width:700px;width:100%;background:var(--card);padding:24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    h1{font-size:1.5rem}
    .step{display:none;margin-top:20px;animation:fadeIn .3s ease}
    .step.active{display:block}
    label{display:block;margin-bottom:6px;font-weight:500}
    input,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
    button{background:var(--primary);color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;width:100%;margin-bottom:8px}
    button:hover{background:var(--primary-hover)}
    button.secondary{background:#666}
    .hint{font-size:.85rem;color:var(--text-light);margin-bottom:12px}
    .error-box{background:#ffebee;color:#c62828;padding:12px;border-radius:8px;margin:12px 0}
    .success-box{background:#e8f5e9;color:#2e7d32;padding:12px;border-radius:8px;margin:12px 0}
    .log{background:#111;color:#0f0;padding:12px;border-radius:8px;font-family:monospace;font-size:.85rem;height:250px;overflow-y:auto;margin-top:16px}
    .progress-bar{width:100%;height:8px;background:#eee;border-radius:4px;margin:12px 0;overflow:hidden}
    .progress-fill{height:100%;background:var(--primary);width:0%}
    .user-info{display:flex;justify-content:space-between;padding:10px;background:#f9f9f9;border-radius:8px;margin-bottom:16px}
    .status-panel{background:#f0f2f5;padding:12px;border-radius:8px;margin-bottom:16px}
    .status-panel span{font-weight:bold;color:var(--primary)}
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>Yandex Saver</h1></div>
  <div class="hint">Сохранение файлов и папок с публичных ссылок на ваш Яндекс.Диск</div>

  <div id="user-block" class="user-info" style="display:none;">
    <span>✅ Диск подключён</span>
    <button onclick="logout()" style="width:auto;padding:6px 12px;background:var(--error)">Выйти</button>
  </div>

  <div id="step-auth" class="step active">
    <label>1. Подключите Яндекс.Диск</label>
    <button id="authPopupBtn">🔑 Авторизоваться (popup)</button>
    <div id="auth-message"></div>
  </div>

  <div id="step-folder" class="step">
    <label>2. Папка назначения</label>
    <input type="text" id="folder-input" value="/saved-materials">
    <button onclick="validateAndCreateFolder()">📁 Проверить и создать</button>
    <div id="folder-status" class="hint"></div>
    <button id="btn-next-links" style="display:none;" onclick="goToStep('step-links')">Далее →</button>
  </div>

  <div id="step-links" class="step">
    <label>3. Вставьте ссылки</label>
    <textarea id="links-input" rows="6" placeholder="https://disk.yandex.ru/i/..."></textarea>
    <button id="btn-start" onclick="startProcess()">🚀 Начать сохранение</button>
    <button id="btn-stop" class="secondary" style="display:none;" onclick="stopProcess()">⏹ Остановить</button>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    <div id="progress-text" style="text-align:center;margin-bottom:8px;"></div>
  </div>

  <div class="status-panel">📋 Статус: <span id="current-status">Ожидание</span></div>
  <div id="log" class="log"></div>
</div>

<script>
  // ---------- КОНФИГУРАЦИЯ ----------
  const CLIENT_ID = 'a0731d71573f4d0a8e40b05760f1badb';
  const REDIRECT_URI = 'https://medushenko.github.io/Yandex-Saver/';
  const API = 'https://cloud-api.yandex.net/v1/disk';
  let TOKEN = sessionStorage.getItem('ydisk_token') || '';
  let TARGET_FOLDER = '';
  let isRunning = false;
  let abortController = null;
  let popup = null;

  // ---------- ОБРАБОТКА POPUP АВТОРИЗАЦИИ ----------
  function startOAuthPopup() {
    updateStatus('Открытие окна авторизации...');
    // Убираем scope — сервер возьмёт права из настроек приложения
    const url = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    const width = 600, height = 700;
    const left = (screen.width - width) / 2;
    const top = (screen.height - height) / 2;
    popup = window.open(url, 'YandexAuth', `width=${width},height=${height},left=${left},top=${top}`);
    if (!popup) {
      updateStatus('Ошибка: разрешите всплывающие окна');
      addLog('❌ Браузер заблокировал всплывающее окно');
      return;
    }
    window.addEventListener('message', receiveTokenFromPopup);
    // Таймаут на случай, если пользователь не завершил авторизацию
    setTimeout(() => {
      if (popup && !popup.closed) {
        popup.close();
        updateStatus('Авторизация отменена (таймаут)');
        window.removeEventListener('message', receiveTokenFromPopup);
      }
    }, 5 * 60 * 1000);
  }

  function receiveTokenFromPopup(event) {
    if (event.origin !== window.location.origin) return;
    if (event.data && event.data.type === 'yandex_token') {
      const token = event.data.token;
      if (token) {
        addLog('🔑 Токен получен, проверяем...');
        verifyTokenAndProceed(token);
      } else {
        addLog('❌ Токен не получен');
        updateStatus('Ошибка авторизации');
      }
      if (popup && !popup.closed) popup.close();
      window.removeEventListener('message', receiveTokenFromPopup);
    }
  }

  // Если страница открыта внутри popup и есть токен — отправляем родителю
  if (window.opener && window.location.hash.includes('access_token=')) {
    const match = window.location.hash.match(/access_token=([^&]+)/);
    if (match) {
      const token = decodeURIComponent(match[1]);
      window.opener.postMessage({ type: 'yandex_token', token: token }, window.location.origin);
      window.close();
    } else {
      document.body.innerHTML = '<h3>Ошибка авторизации</h3><p>Не удалось получить токен. Закройте окно и попробуйте снова.</p>';
    }
  }

  // ---------- ПРОВЕРКА ТОКЕНА ----------
  async function verifyTokenAndProceed(token) {
    updateStatus('Проверка токена...');
    try {
      const test = await fetch(`${API}/`, { headers: { 'Authorization': `OAuth ${token}` } });
      if (test.ok) {
        TOKEN = token;
        sessionStorage.setItem('ydisk_token', TOKEN);
        addLog('✅ Токен действителен');
        onAuthSuccess();
      } else {
        addLog('❌ Токен недействителен, требуется повторная авторизация');
        logout();
      }
    } catch (e) {
      addLog(`Ошибка проверки: ${e.message}`);
      logout();
    }
  }

  // ---------- ЗАГРУЗКА СТРАНИЦЫ (проверка сохранённого токена) ----------
  window.addEventListener('DOMContentLoaded', async () => {
    if (TOKEN) {
      addLog('Найден сохранённый токен, проверяем...');
      await verifyTokenAndProceed(TOKEN);
    } else {
      addLog('Требуется авторизация. Нажмите "Авторизоваться (popup)"');
      updateStatus('Не авторизован');
    }
    document.getElementById('authPopupBtn').addEventListener('click', startOAuthPopup);
  });

  // ---------- ОСТАЛЬНЫЕ ФУНКЦИИ (без изменений) ----------
  function onAuthSuccess() {
    showMessage('success', '✅ Яндекс.Диск подключён');
    document.getElementById('user-block').style.display = 'flex';
    updateStatus('Авторизация успешна');
    goToStep('step-folder');
  }

  function goToStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showMessage(type, text) {
    const div = document.createElement('div');
    div.className = type === 'error' ? 'error-box' : 'success-box';
    div.textContent = text;
    const container = document.getElementById('auth-message');
    container.innerHTML = '';
    container.appendChild(div);
    setTimeout(() => div.remove(), 5000);
  }

  function updateStatus(msg) {
    document.getElementById('current-status').innerText = msg;
  }

  function addLog(msg) {
    const el = document.getElementById('log');
    el.style.display = 'block';
    const time = new Date().toLocaleTimeString('ru-RU');
    el.textContent += `[${time}] ${msg}\n`;
    el.scrollTop = el.scrollHeight;
    console.log(msg);
  }

  function logout() {
    TOKEN = '';
    sessionStorage.removeItem('ydisk_token');
    document.getElementById('user-block').style.display = 'none';
    document.getElementById('log').innerHTML = '';
    updateStatus('Вы вышли');
    goToStep('step-auth');
    addLog('🔓 Вы вышли из аккаунта');
  }

  async function validateAndCreateFolder() {
    let input = document.getElementById('folder-input').value.trim();
    TARGET_FOLDER = input.startsWith('/') ? input : '/' + input;
    addLog(`📁 Проверка/создание папки: ${TARGET_FOLDER}`);
    updateStatus(`Проверка папки...`);
    try {
      const res = await fetch(`${API}/resources?path=${encodeURIComponent(TARGET_FOLDER)}`, {
        headers: { 'Authorization': `OAuth ${TOKEN}` }
      });
      if (res.status === 404) {
        addLog('Папка не найдена, создаю...');
        const createRes = await fetch(`${API}/resources?path=${encodeURIComponent(TARGET_FOLDER)}`, {
          method: 'PUT',
          headers: { 'Authorization': `OAuth ${TOKEN}` }
        });
        if (!createRes.ok) throw new Error('Не удалось создать папку');
        addLog('✅ Папка создана');
      } else if (!res.ok) throw new Error(`Ошибка ${res.status}`);
      else addLog('✅ Папка уже существует');
      document.getElementById('folder-status').innerHTML = `✅ Готово: ${TARGET_FOLDER}`;
      document.getElementById('btn-next-links').style.display = 'block';
      updateStatus(`Папка готова: ${TARGET_FOLDER}`);
    } catch (e) {
      document.getElementById('folder-status').innerHTML = `❌ ${e.message}`;
      addLog(`❌ Ошибка: ${e.message}`);
      updateStatus(`Ошибка: ${e.message}`);
    }
  }

  function extractPublicKey(url) {
    const match = url.match(/(?:yadi\.sk|disk\.yandex\.ru)\/(?:i|d)\/([A-Za-z0-9_-]+)/);
    return match ? match[1] : null;
  }

  async function ensureFolder(path) {
    const res = await fetch(`${API}/resources?path=${encodeURIComponent(path)}`, {
      headers: { 'Authorization': `OAuth ${TOKEN}` }
    });
    if (res.status === 404) {
      const create = await fetch(`${API}/resources?path=${encodeURIComponent(path)}`, {
        method: 'PUT',
        headers: { 'Authorization': `OAuth ${TOKEN}` }
      });
      if (!create.ok) throw new Error(`Не удалось создать папку ${path}`);
      addLog(`📁 Создана папка: ${path}`);
    } else if (!res.ok) throw new Error(`Ошибка проверки папки ${path}: ${res.status}`);
  }

  async function saveFile(publicKey, targetPath, fileName) {
    const headers = { 'Authorization': `OAuth ${TOKEN}` };
    updateStatus(`Скачивание: ${fileName}`);
    const dlInfo = await fetch(`${API}/resources/public/download?public_key=${publicKey}`, { headers, signal: abortController?.signal });
    if (!dlInfo.ok) throw new Error(`Не удалось получить ссылку на скачивание: ${dlInfo.status}`);
    const dlData = await dlInfo.json();
    const fileResp = await fetch(dlData.href, { signal: abortController?.signal });
    if (!fileResp.ok) throw new Error('Ошибка скачивания файла');
    const blob = await fileResp.blob();
    const fullPath = `${targetPath}/${fileName}`;
    updateStatus(`Загрузка на Диск: ${fullPath}`);
    const uploadReq = await fetch(`${API}/resources/upload?path=${encodeURIComponent(fullPath)}&overwrite=true&mkdir=true`, {
      method: 'POST', headers, signal: abortController?.signal
    });
    if (!uploadReq.ok) throw new Error(`Не удалось получить URL загрузки: ${uploadReq.status}`);
    const uploadUrl = (await uploadReq.json()).href;
    const putRes = await fetch(uploadUrl, { method: 'PUT', body: blob, signal: abortController?.signal });
    if (!putRes.ok) throw new Error(`Ошибка загрузки: ${putRes.status}`);
    addLog(`✅ Файл сохранён: ${fullPath}`);
  }

  async function processFolder(publicKey, targetPath) {
    if (!isRunning) throw new Error('Остановлено');
    addLog(`📂 Обработка папки: ${targetPath}`);
    updateStatus(`Обработка папки: ${targetPath}`);
    await ensureFolder(targetPath);
    let offset = 0;
    const limit = 1000;
    let hasMore = true;
    while (hasMore && isRunning) {
      const url = `${API}/resources/public?public_key=${publicKey}&limit=${limit}&offset=${offset}`;
      const resp = await fetch(url, { headers: { 'Authorization': `OAuth ${TOKEN}` }, signal: abortController?.signal });
      if (!resp.ok) throw new Error(`Не удалось получить содержимое папки: ${resp.status}`);
      const data = await resp.json();
      const items = data._embedded?.items || [];
      for (const item of items) {
        if (!isRunning) throw new Error('Остановлено');
        if (item.type === 'file') await saveFile(item.public_key, targetPath, item.name);
        else if (item.type === 'dir') await processFolder(item.public_key, `${targetPath}/${item.name}`);
      }
      hasMore = !!data._embedded?.next;
      offset += limit;
    }
  }

  async function processPublicLink(publicKey, targetPath) {
    const metaResp = await fetch(`${API}/resources/public?public_key=${publicKey}`, {
      headers: { 'Authorization': `OAuth ${TOKEN}` }, signal: abortController?.signal
    });
    if (!metaResp.ok) throw new Error(`Не удалось получить информацию о ресурсе: ${metaResp.status}`);
    const meta = await metaResp.json();
    if (meta.type === 'file') await saveFile(publicKey, targetPath, meta.name);
    else if (meta.type === 'dir') await processFolder(publicKey, targetPath);
    else throw new Error('Неизвестный тип ресурса');
  }

  async function startProcess() {
    const raw = document.getElementById('links-input').value.trim();
    if (!raw) return alert('Вставьте ссылки');
    const keys = raw.split(/\n/).map(u => extractPublicKey(u.trim())).filter(Boolean);
    if (!keys.length) return alert('Не удалось распознать ссылки');

    isRunning = true;
    abortController = new AbortController();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').style.display = 'block';
    addLog(`🚀 Найдено ресурсов: ${keys.length}`);
    updateStatus(`Начинаем обработку...`);

    let success = 0;
    for (let i = 0; i < keys.length; i++) {
      if (!isRunning) break;
      document.getElementById('progress-text').innerText = `${i+1}/${keys.length}`;
      document.getElementById('progress-fill').style.width = `${(i/keys.length)*100}%`;
      try {
        await processPublicLink(keys[i], TARGET_FOLDER);
        success++;
      } catch (e) {
        if (e.message === 'Остановлено') break;
        addLog(`❌ Ошибка #${i+1}: ${e.message}`);
        updateStatus(`Ошибка: ${e.message}`);
      }
      await new Promise(r => setTimeout(r, 500));
    }
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-text').innerText = `✅ Готово: ${success}/${keys.length}`;
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').style.display = 'none';
    isRunning = false;
    updateStatus(success === keys.length ? 'Завершено успешно' : 'Завершено с ошибками');
  }

  function stopProcess() {
    isRunning = false;
    if (abortController) abortController.abort();
    addLog('⏹ Остановка по запросу');
    updateStatus('Остановка...');
  }
</script>
</body>
</html>
