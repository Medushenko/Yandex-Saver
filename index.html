    const API = 'https://cloud-api.yandex.net/v1/disk';

    // Глобальные переменные
    let TOKEN = sessionStorage.getItem('ydisk_token') || '';
    let TARGET_FOLDER = '';

    // Управление этапами

    }

    function goToStep(stepId) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(stepId).classList.add('active');
    }

    // Авторизация через popup
    function startOAuthPopup() {
      // ... (открытие окна авторизации, обработка сообщений)
    }

    async function verifyTokenAndProceed(token) {
      try {
        const test = await fetch(`${API}/`, {
          headers: { 'Authorization': `OAuth ${token}` },
          method: 'GET'
        });
        if (test.ok) {
          TOKEN = token;
          sessionStorage.setItem('ydisk_token', TOKEN);
          onAuthSuccess();
        } else {
          const errText = await test.text().catch(() => '');
          addLog(`❌ Токен отклонён: ${test.status} ${errText.slice(0,100)}`);
          logout();
        }
      } catch (e) {
        addLog(`❌ Ошибка проверки токена: ${e.message}`);
        logout();
      }
    }

    // Инициализация
    window.addEventListener('DOMContentLoaded', async () => {
      // Привязка обработчиков событий
      document.getElementById('authPopupBtn').addEventListener('click', startOAuthPopup);
      // ...
    });

    // Вспомогательные функции
    function addLog(message) {
      const log = document.getElementById('log');
      log.textContent += message + '\n';
      log.scrollTop = log.scrollHeight; // Прокрутка вниз
    }

    function updateStatus(text) {
      document.getElementById('current-status').textContent = text;
    }

    function logout() {
      sessionStorage.removeItem('ydisk_token');
      TOKEN = '';
      document.getElementById('user-block').style.display = 'none';
      goToStep('step-auth');
      updateStage(1);
      addLog('🚫 Пользователь вышел из системы');
      updateStatus('Не авторизован');
    }

    function showMessage(type, text) {
      const container = document.getElementById('auth-message');
      container.innerHTML = '';
      const div = document.createElement('div');
      div.className = `message-${type}`; // success/error/warning
      div.textContent = text;
      container.appendChild(div);
    }
