<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yandex Saver — Сохранение на Яндекс.Диск</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #fc3f1d;
      --primary-hover: #e6300f;
      --text: #333333;
      --text-light: #666666;
      --border: #e0e0e0;
      --success: #4caf50;
      --error: #f44336;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: var(--bg);
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: var(--card);
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 8px;
      color: var(--primary);
    }
    .sub {
      color: var(--text-light);
      margin-bottom: 24px;
      font-size: 0.9rem;
      border-left: 3px solid var(--primary);
      padding-left: 12px;
    }
    .step {
      display: none;
      margin-top: 20px;
    }
    .step.active {
      display: block;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      transition: 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(252, 63, 29, 0.2);
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    button:hover {
      background: var(--primary-hover);
    }
    button.secondary {
      background: #6c757d;
    }
    button.secondary:hover {
      background: #5a6268;
    }
    button:disabled {
      background: #adb5bd;
      cursor: not-allowed;
    }
    .info-card {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 12px 16px;
      margin: 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .log {
      background: #1e1e2f;
      color: #00ff9d;
      padding: 14px;
      border-radius: 16px;
      font-family: 'Monaco', monospace;
      font-size: 0.8rem;
      height: 220px;
      overflow-y: auto;
      margin-top: 20px;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e9ecef;
      border-radius: 10px;
      margin: 16px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.2s ease;
      border-radius: 10px;
    }
    .status-badge {
      background: var(--bg);
      padding: 8px 12px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      display: inline-block;
    }
    hr {
      margin: 20px 0;
      border: none;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📦 Yandex Saver</h1>
  <div class="sub">Сохраняйте файлы и целые папки из публичных ссылок в свой Яндекс.Диск</div>

  <div id="userPanel" class="info-card" style="display: none;">
    <span>✅ <strong>Диск подключён</strong></span>
    <button id="logoutBtn" style="width: auto; background: var(--error); padding: 6px 14px;">Выйти</button>
  </div>

  <!-- Шаг 1: Авторизация -->
  <div id="stepAuth" class="step active">
    <label>🔐 1. Подключите Яндекс.Диск</label>
    <button id="authPopupBtn">Подключить аккаунт</button>
    <div id="authMessage"></div>
  </div>

  <!-- Шаг 2: Выбор папки -->
  <div id="stepFolder" class="step">
    <label>📁 2. Куда сохранять?</label>
    <input type="text" id="folderPath" value="/saved-materials" placeholder="Например: /work/backup">
    <button id="checkFolderBtn">Проверить и создать</button>
    <div id="folderStatus" style="font-size: 0.85rem; margin-top: 8px;"></div>
    <button id="nextToLinksBtn" style="display: none;">Далее →</button>
  </div>

  <!-- Шаг 3: Вставка ссылок и запуск -->
  <div id="stepLinks" class="step">
    <label>🔗 3. Вставьте публичные ссылки</label>
    <textarea id="linksArea" rows="5" placeholder="https://disk.yandex.ru/i/abc123&#10;https://yadi.sk/d/folder_key"></textarea>
    <button id="startSaveBtn">🚀 Начать сохранение</button>
    <button id="stopSaveBtn" class="secondary" style="display: none;">⏹ Остановить</button>
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <div id="progressText" style="text-align: center; font-size: 0.85rem;"></div>
  </div>

  <div class="status-badge" id="globalStatus">📋 Статус: Ожидание</div>
  <div id="logArea" class="log"></div>
</div>

<script>
  // ---------- КОНФИГУРАЦИЯ ----------
  const CLIENT_ID = 'a0731d71573f4d0a8e40b05760f1badb';
  const REDIRECT_URI = 'https://medushenko.github.io/Yandex-Saver/';
  const API_URL = 'https://cloud-api.yandex.net/v1/disk';

  let currentToken = sessionStorage.getItem('yd_token') || '';
  let targetFolder = '';
  let isProcessing = false;
  let abortController = null;
  let authPopup = null;

  // ---------- DOM ЭЛЕМЕНТЫ ----------
  const stepAuth = document.getElementById('stepAuth');
  const stepFolder = document.getElementById('stepFolder');
  const stepLinks = document.getElementById('stepLinks');
  const userPanel = document.getElementById('userPanel');
  const globalStatusSpan = document.getElementById('globalStatus');
  const logDiv = document.getElementById('logArea');

  // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
  function updateStatus(text) {
    globalStatusSpan.innerText = `📋 Статус: ${text}`;
    console.log(`[STATUS] ${text}`);
  }

  function addLog(msg) {
    const time = new Date().toLocaleTimeString('ru-RU');
    logDiv.style.display = 'block';
    logDiv.textContent += `[${time}] ${msg}\n`;
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(msg);
  }

  function showMessage(containerId, type, text) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const div = document.createElement('div');
    div.className = type === 'error' ? 'error-box' : 'success-box';
    div.textContent = text;
    div.style.padding = '10px';
    div.style.borderRadius = '12px';
    div.style.margin = '10px 0';
    div.style.background = type === 'error' ? '#ffe5e5' : '#e0ffe5';
    div.style.color = type === 'error' ? '#c00' : '#2c6e2c';
    container.innerHTML = '';
    container.appendChild(div);
    setTimeout(() => div.remove(), 4000);
  }

  function goToStep(stepId) {
    [stepAuth, stepFolder, stepLinks].forEach(s => s.classList.remove('active'));
    document.getElementById(stepId).classList.add('active');
  }

  // ---------- РАБОТА С ТОКЕНОМ ----------
  async function verifyToken(token) {
    try {
      const res = await fetch(`${API_URL}/`, {
        headers: { 'Authorization': `OAuth ${token}` }
      });
      return res.ok;
    } catch {
      return false;
    }
  }

  async function onAuthSuccess(token) {
    currentToken = token;
    sessionStorage.setItem('yd_token', token);
    userPanel.style.display = 'flex';
    updateStatus('Авторизация успешна');
    addLog('✅ Токен получен и проверен');
    goToStep('stepFolder');
  }

  function logout() {
    currentToken = '';
    sessionStorage.removeItem('yd_token');
    userPanel.style.display = 'none';
    updateStatus('Вы вышли');
    addLog('🔓 Сессия завершена');
    goToStep('stepAuth');
  }

  // ---------- АВТОРИЗАЦИЯ ЧЕРЕЗ POPUP (БЕЗ SCOPE) ----------
  function startAuthPopup() {
    updateStatus('Открытие окна авторизации...');
    // Убираем scope полностью — сервер возьмёт права из настроек приложения
    const url = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    const width = 600, height = 700;
    const left = (screen.width - width) / 2;
    const top = (screen.height - height) / 2;
    authPopup = window.open(url, 'YandexAuth', `width=${width},height=${height},left=${left},top=${top}`);
    if (!authPopup) {
      updateStatus('Ошибка: разрешите всплывающие окна');
      addLog('❌ Браузер заблокировал всплывающее окно');
      return;
    }
    window.addEventListener('message', onTokenReceived);
    // Таймаут на случай зависания
    setTimeout(() => {
      if (authPopup && !authPopup.closed) {
        authPopup.close();
        updateStatus('Авторизация отменена по таймауту');
        window.removeEventListener('message', onTokenReceived);
      }
    }, 5 * 60 * 1000);
  }

  function onTokenReceived(event) {
    if (event.origin !== window.location.origin) return;
    if (event.data && event.data.type === 'yandex_token') {
      const token = event.data.token;
      if (token) {
        addLog('🔑 Токен перехвачен, проверяем...');
        verifyToken(token).then(valid => {
          if (valid) onAuthSuccess(token);
          else {
            addLog('❌ Токен недействителен');
            updateStatus('Ошибка авторизации');
          }
        });
      } else {
        addLog('❌ Токен не получен');
      }
      if (authPopup && !authPopup.closed) authPopup.close();
      window.removeEventListener('message', onTokenReceived);
    }
  }

  // Если страница открыта внутри popup и есть токен — отправляем родителю
  if (window.opener && window.location.hash.includes('access_token=')) {
    const match = window.location.hash.match(/access_token=([^&]+)/);
    if (match) {
      const token = decodeURIComponent(match[1]);
      window.opener.postMessage({ type: 'yandex_token', token: token }, window.location.origin);
      window.close();
    } else {
      document.body.innerHTML = '<h3>Ошибка авторизации</h3><p>Не удалось получить токен. Закройте окно и попробуйте снова.</p>';
    }
  }

  // ---------- РАБОТА С ПАПКОЙ ----------
  async function validateAndCreateFolder() {
    const input = document.getElementById('folderPath').value.trim();
    if (!input) return;
    targetFolder = input.startsWith('/') ? input : '/' + input;
    addLog(`📁 Проверка/создание: ${targetFolder}`);
    updateStatus('Проверка папки...');
    try {
      const res = await fetch(`${API_URL}/resources?path=${encodeURIComponent(targetFolder)}`, {
        headers: { 'Authorization': `OAuth ${currentToken}` }
      });
      if (res.status === 404) {
        addLog('Папка не найдена, создаю...');
        const createRes = await fetch(`${API_URL}/resources?path=${encodeURIComponent(targetFolder)}`, {
          method: 'PUT',
          headers: { 'Authorization': `OAuth ${currentToken}` }
        });
        if (!createRes.ok) throw new Error('Не удалось создать');
        addLog('✅ Папка создана');
      } else if (!res.ok) throw new Error(`Ошибка ${res.status}`);
      else addLog('✅ Папка существует');
      document.getElementById('folderStatus').innerHTML = `<span style="color:var(--success)">✅ Готово: ${targetFolder}</span>`;
      document.getElementById('nextToLinksBtn').style.display = 'block';
      updateStatus(`Папка готова: ${targetFolder}`);
    } catch (e) {
      document.getElementById('folderStatus').innerHTML = `<span style="color:var(--error)">❌ ${e.message}</span>`;
      addLog(`❌ Ошибка: ${e.message}`);
      updateStatus(`Ошибка: ${e.message}`);
    }
  }

  // ---------- ОСНОВНАЯ ЛОГИКА СОХРАНЕНИЯ ----------
  function extractPublicKey(url) {
    const match = url.match(/(?:yadi\.sk|disk\.yandex\.ru)\/(?:i|d)\/([A-Za-z0-9_-]+)/);
    return match ? match[1] : null;
  }

  async function ensureFolder(path) {
    const res = await fetch(`${API_URL}/resources?path=${encodeURIComponent(path)}`, {
      headers: { 'Authorization': `OAuth ${currentToken}` }
    });
    if (res.status === 404) {
      const create = await fetch(`${API_URL}/resources?path=${encodeURIComponent(path)}`, {
        method: 'PUT',
        headers: { 'Authorization': `OAuth ${currentToken}` }
      });
      if (!create.ok) throw new Error(`Не удалось создать ${path}`);
      addLog(`📁 Создана папка: ${path}`);
    } else if (!res.ok) throw new Error(`Ошибка проверки ${path}`);
  }

  async function saveFile(publicKey, targetPath, fileName) {
    const headers = { 'Authorization': `OAuth ${currentToken}` };
    updateStatus(`Скачивание: ${fileName}`);
    const dlInfo = await fetch(`${API_URL}/resources/public/download?public_key=${publicKey}`, { headers, signal: abortController?.signal });
    if (!dlInfo.ok) throw new Error(`Не удалось получить ссылку: ${dlInfo.status}`);
    const dlData = await dlInfo.json();
    const fileResp = await fetch(dlData.href, { signal: abortController?.signal });
    if (!fileResp.ok) throw new Error('Ошибка скачивания');
    const blob = await fileResp.blob();
    const fullPath = `${targetPath}/${fileName}`;
    updateStatus(`Загрузка: ${fullPath}`);
    const uploadReq = await fetch(`${API_URL}/resources/upload?path=${encodeURIComponent(fullPath)}&overwrite=true&mkdir=true`, {
      method: 'POST', headers, signal: abortController?.signal
    });
    if (!uploadReq.ok) throw new Error(`Ошибка получения URL загрузки`);
    const uploadUrl = (await uploadReq.json()).href;
    const putRes = await fetch(uploadUrl, { method: 'PUT', body: blob, signal: abortController?.signal });
    if (!putRes.ok) throw new Error(`Ошибка загрузки: ${putRes.status}`);
    addLog(`✅ Файл сохранён: ${fullPath}`);
  }

  async function processFolder(publicKey, targetPath) {
    if (!isProcessing) throw new Error('Остановлено');
    addLog(`📂 Обработка папки: ${targetPath}`);
    updateStatus(`Обработка папки: ${targetPath}`);
    await ensureFolder(targetPath);
    let offset = 0;
    const limit = 1000;
    let hasMore = true;
    while (hasMore && isProcessing) {
      const url = `${API_URL}/resources/public?public_key=${publicKey}&limit=${limit}&offset=${offset}`;
      const resp = await fetch(url, { headers: { 'Authorization': `OAuth ${currentToken}` }, signal: abortController?.signal });
      if (!resp.ok) throw new Error(`Не удалось получить содержимое: ${resp.status}`);
      const data = await resp.json();
      const items = data._embedded?.items || [];
      for (const item of items) {
        if (!isProcessing) throw new Error('Остановлено');
        if (item.type === 'file') await saveFile(item.public_key, targetPath, item.name);
        else if (item.type === 'dir') await processFolder(item.public_key, `${targetPath}/${item.name}`);
      }
      hasMore = !!data._embedded?.next;
      offset += limit;
    }
  }

  async function processPublicLink(publicKey, targetPath) {
    const metaResp = await fetch(`${API_URL}/resources/public?public_key=${publicKey}`, {
      headers: { 'Authorization': `OAuth ${currentToken}` }, signal: abortController?.signal
    });
    if (!metaResp.ok) throw new Error(`Не удалось получить информацию: ${metaResp.status}`);
    const meta = await metaResp.json();
    if (meta.type === 'file') await saveFile(publicKey, targetPath, meta.name);
    else if (meta.type === 'dir') await processFolder(publicKey, targetPath);
    else throw new Error('Неизвестный тип');
  }

  async function startSaving() {
    const raw = document.getElementById('linksArea').value.trim();
    if (!raw) return alert('Вставьте ссылки');
    const keys = raw.split(/\n/).map(u => extractPublicKey(u.trim())).filter(Boolean);
    if (!keys.length) return alert('Не удалось распознать ссылки. Убедитесь, что ссылки на yadi.sk или disk.yandex.ru');
    isProcessing = true;
    abortController = new AbortController();
    const startBtn = document.getElementById('startSaveBtn');
    const stopBtn = document.getElementById('stopSaveBtn');
    startBtn.disabled = true;
    stopBtn.style.display = 'block';
    addLog(`🚀 Найдено ресурсов: ${keys.length}`);
    updateStatus(`Обработка ${keys.length} элементов...`);
    let success = 0;
    for (let i = 0; i < keys.length; i++) {
      if (!isProcessing) break;
      const percent = ((i) / keys.length) * 100;
      document.getElementById('progressFill').style.width = `${percent}%`;
      document.getElementById('progressText').innerText = `${i+1} / ${keys.length}`;
      try {
        await processPublicLink(keys[i], targetFolder);
        success++;
      } catch (e) {
        if (e.message === 'Остановлено') break;
        addLog(`❌ Ошибка #${i+1}: ${e.message}`);
        updateStatus(`Ошибка: ${e.message}`);
      }
      await new Promise(r => setTimeout(r, 500));
    }
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressText').innerText = `✅ Готово: ${success}/${keys.length}`;
    startBtn.disabled = false;
    stopBtn.style.display = 'none';
    isProcessing = false;
    updateStatus(success === keys.length ? 'Всё готово' : 'Завершено с ошибками');
  }

  function stopSaving() {
    isProcessing = false;
    if (abortController) abortController.abort();
    addLog('⏹ Остановлено пользователем');
    updateStatus('Остановка...');
  }

  // ---------- ЗАГРУЗКА ПРИЛОЖЕНИЯ И ПРОВЕРКА ТОКЕНА ----------
  window.addEventListener('DOMContentLoaded', async () => {
    if (currentToken) {
      addLog('🔍 Проверяем сохранённый токен...');
      const valid = await verifyToken(currentToken);
      if (valid) {
        addLog('✅ Токен действителен');
        userPanel.style.display = 'flex';
        goToStep('stepFolder');
        updateStatus('Авторизация подтверждена');
      } else {
        addLog('⚠️ Токен устарел, нужен повторный вход');
        logout();
      }
    } else {
      addLog('🔐 Требуется авторизация');
    }

    // Навешиваем обработчики
    document.getElementById('authPopupBtn').addEventListener('click', startAuthPopup);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('checkFolderBtn').addEventListener('click', validateAndCreateFolder);
    document.getElementById('nextToLinksBtn').addEventListener('click', () => goToStep('stepLinks'));
    document.getElementById('startSaveBtn').addEventListener('click', startSaving);
    document.getElementById('stopSaveBtn').addEventListener('click', stopSaving);
  });
</script>
</body>
</html>
