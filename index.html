<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yandex Saver - Сохранение на Яндекс.Диск</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#fc3f1d">
  <style>
    :root{--bg:#f5f7fa;--card:#fff;--primary:#fc3f1d;--primary-hover:#e6300f;--text:#333;--text-light:#666;--border:#e0e0e0;--success:#4caf50;--error:#f44336}
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body{background:var(--bg);color:var(--text);padding:20px;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
    .container{max-width:600px;width:100%;background:var(--card);padding:24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .header-icon{width:48px;height:48px}
    h1{font-size:1.5rem}
    .step{display:none;margin-top:20px;animation:fadeIn .3s ease}
    .step.active{display:block}
    label{display:block;margin-bottom:6px;font-weight:500;font-size:.95rem}
    input,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:1rem;margin-bottom:12px}
    input:focus,textarea:focus{outline:none;border-color:var(--primary)}
    button{background:var(--primary);color:#fff;border:none;padding:12px 20px;border-radius:8px;font-size:1rem;cursor:pointer;width:100%;transition:background .2s;margin-bottom:8px}
    button:hover{background:var(--primary-hover)}
    button:disabled{background:#ccc;cursor:not-allowed}
    button.secondary{background:#666}
    button.secondary:hover{background:#555}
    .hint{font-size:.85rem;color:var(--text-light);margin-bottom:12px;line-height:1.4}
    .error-box{background:#ffebee;color:#c62828;padding:12px;border-radius:8px;margin:12px 0;font-size:.9rem}
    .success-box{background:#e8f5e9;color:#2e7d32;padding:12px;border-radius:8px;margin:12px 0;font-size:.9rem}
    .log{background:#111;color:#0f0;padding:12px;border-radius:8px;font-family:monospace;font-size:.85rem;height:200px;overflow-y:auto;margin-top:16px;white-space:pre-wrap}
    .progress-bar{width:100%;height:8px;background:#eee;border-radius:4px;margin:12px 0;overflow:hidden}
    .progress-fill{height:100%;background:var(--primary);width:0%;transition:width .3s}
    .user-info{display:flex;align-items:center;justify-content:space-between;padding:10px;background:#f9f9f9;border-radius:8px;margin-bottom:16px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="favicon.svg" alt="Yandex Saver" class="header-icon">
      <h1>Yandex Saver</h1>
    </div>
    <div class="hint">Сохранение файлов и папок с публичных ссылок на <strong>ваш</strong> Яндекс.Диск</div>

    <div id="user-block" class="user-info" style="display:none;">
      <span>✅ Яндекс.Диск подключён</span>
      <button onclick="logout()" style="width:auto;padding:6px 12px;font-size:.85rem;background:var(--error)">Выйти</button>
    </div>

    <div id="step-auth" class="step active">
      <label>1. Подключите Яндекс.Диск</label>
      <div class="hint">Нажмите кнопку → войдите в <strong>свой</strong> аккаунт → нажмите <strong>"Разрешить"</strong>.</div>
      <button id="btn-auth" onclick="startOAuth()">🔑 Подключить Яндекс.Диск</button>
      <div id="auth-message"></div>
    </div>

    <div id="step-folder" class="step">
      <label>2. Папка назначения</label>
      <div class="hint">Введите путь на вашем Диске (будет создана автоматически)</div>
      <input type="text" id="folder-input" value="/saved-materials" placeholder="/например: /work/2024">
      <button onclick="validateAndCreateFolder()">📁 Проверить и создать</button>
      <div id="folder-status" class="hint" style="margin-top:8px;"></div>
      <button id="btn-next-links" style="margin-top:16px;display:none;" onclick="goToStep('step-links')">Далее →</button>
    </div>

    <div id="step-links" class="step">
      <label>3. Вставьте ссылки</label>
      <div class="hint">Каждая ссылка с новой строки (поддерживаются файлы и папки)</div>
      <textarea id="links-input" rows="6" placeholder="https://disk.yandex.ru/i/ABC123&#10;https://disk.yandex.ru/d/XYZ789&#10;https://yadi.sk/d/folder_key"></textarea>
      <button id="btn-start" onclick="startProcess()">🚀 Начать сохранение</button>
      <button id="btn-stop" class="secondary" style="display:none;" onclick="stopProcess()">⏹ Остановить</button>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <div id="progress-text" style="text-align:center;font-size:.9rem;margin-bottom:8px;"></div>
    </div>

    <div id="log" class="log" style="display:none;"></div>
  </div>

  <script>
    const CLIENT_ID = '89ec41a83e4e47328b3fa1e7b818c402';
    const REDIRECT_URI = 'https://medushenko.github.io/Yandex-Saver/';
    const API = 'https://cloud-api.yandex.net/v1/disk';
    let TOKEN = sessionStorage.getItem('ydisk_token') || '';
    let TARGET_FOLDER = '';
    let isRunning = false;
    let abortController = null;

    window.addEventListener('DOMContentLoaded', async () => {
      log('🔍 Проверка состояния...');
      const hash = window.location.hash;
      if (hash && hash.includes('access_token=')) {
        const match = hash.match(/access_token=([^&]+)/);
        if (match) {
          TOKEN = decodeURIComponent(match[1]);
          sessionStorage.setItem('ydisk_token', TOKEN);
          history.replaceState(null, '', window.location.pathname + window.location.search);
          log('✅ Токен получен! Проверка доступа...');
          await onAuthSuccess();
        } else {
          log('❌ Токен не найден');
          showMessage('error', '❌ Ошибка: токен не получен.');
        }
      } else if (TOKEN) {
        log('📋 Найден сохранённый токен, проверяю...');
        try {
          const test = await fetch(`${API}/`, { headers: { 'Authorization': `OAuth ${TOKEN}` } });
          if (test.ok) {
            log('✅ Токен действителен');
            await onAuthSuccess();
          } else {
            log('❌ Токен недействителен');
            logout();
          }
        } catch (e) {
          log(`❌ Ошибка проверки: ${e.message}`);
          logout();
        }
      } else {
        log('⚠️ Требуется авторизация.');
      }
    });

    async function onAuthSuccess() {
      showMessage('success', '✅ Успешно подключено к Яндекс.Диску!');
      document.getElementById('user-block').style.display = 'flex';
      setTimeout(() => goToStep('step-folder'), 1000);
    }

    function goToStep(id) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showMessage(type, text) {
      const div = document.createElement('div');
      div.className = type === 'error' ? 'error-box' : 'success-box';
      div.textContent = text;
      const container = document.getElementById('auth-message');
      container.innerHTML = '';
      container.appendChild(div);
      setTimeout(() => div.remove(), 5000);
    }

    function log(msg) {
      const el = document.getElementById('log');
      el.style.display = 'block';
      const time = new Date().toLocaleTimeString('ru-RU');
      el.textContent += `[${time}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }

    function startOAuth() {
      log('🚀 Начало авторизации...');
      const scope = 'disk:read disk:write';
      const url = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${encodeURIComponent(CLIENT_ID)}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
      window.location.href = url;
    }

    function logout() {
      TOKEN = '';
      sessionStorage.removeItem('ydisk_token');
      document.getElementById('user-block').style.display = 'none';
      document.getElementById('log').textContent = '';
      goToStep('step-auth');
      log('🔓 Вы вышли');
    }

    async function validateAndCreateFolder() {
      let input = document.getElementById('folder-input').value.trim();
      TARGET_FOLDER = input.startsWith('/') ? input : '/' + input;
      log(`📁 Проверка/создание папки: ${TARGET_FOLDER}`);
      try {
        const res = await fetch(`${API}/resources?path=${encodeURIComponent(TARGET_FOLDER)}`, {
          headers: { 'Authorization': `OAuth ${TOKEN}` }
        });
        if (res.status === 404) {
          log('⚠️ Папка не найдена, создаю...');
          const createRes = await fetch(`${API}/resources?path=${encodeURIComponent(TARGET_FOLDER)}`, {
            method: 'PUT',
            headers: { 'Authorization': `OAuth ${TOKEN}` }
          });
          if (!createRes.ok) throw new Error('Не удалось создать папку');
          log('✅ Папка создана');
        } else if (!res.ok) {
          throw new Error(`Ошибка ${res.status}`);
        } else {
          log('✅ Папка уже существует');
        }
        document.getElementById('folder-status').textContent = `✅ Готово: ${TARGET_FOLDER}`;
        document.getElementById('folder-status').style.color = 'var(--success)';
        document.getElementById('btn-next-links').style.display = 'block';
      } catch (e) {
        document.getElementById('folder-status').textContent = `❌ ${e.message}`;
        log(`❌ Ошибка: ${e.message}`);
      }
    }

    function extractPublicKey(url) {
      const match = url.match(/(?:yadi\.sk|disk\.yandex\.ru)\/(?:i|d)\/([A-Za-z0-9_-]+)/);
      return match ? match[1] : null;
    }

    // Создание папки на целевом диске (если не существует)
    async function ensureFolder(path) {
      const res = await fetch(`${API}/resources?path=${encodeURIComponent(path)}`, {
        headers: { 'Authorization': `OAuth ${TOKEN}` }
      });
      if (res.status === 404) {
        const create = await fetch(`${API}/resources?path=${encodeURIComponent(path)}`, {
          method: 'PUT',
          headers: { 'Authorization': `OAuth ${TOKEN}` }
        });
        if (!create.ok) throw new Error(`Не удалось создать папку ${path}`);
        log(`📁 Создана папка: ${path}`);
      } else if (!res.ok) {
        throw new Error(`Ошибка при проверке папки ${path}: ${res.status}`);
      }
    }

    // Сохранить один файл по публичному ключу
    async function saveFile(publicKey, targetPath, fileName) {
      const headers = { 'Authorization': `OAuth ${TOKEN}` };
      const dlInfo = await fetch(`${API}/resources/public/download?public_key=${publicKey}`, { headers, signal: abortController?.signal });
      if (!dlInfo.ok) throw new Error(`Не удалось получить ссылку на скачивание: ${dlInfo.status}`);
      const dlData = await dlInfo.json();
      const fileResp = await fetch(dlData.href, { signal: abortController?.signal });
      if (!fileResp.ok) throw new Error('Ошибка скачивания файла');
      const blob = await fileResp.blob();
      const fullPath = `${targetPath}/${fileName}`;
      const uploadReq = await fetch(`${API}/resources/upload?path=${encodeURIComponent(fullPath)}&overwrite=true&mkdir=true`, {
        method: 'POST',
        headers,
        signal: abortController?.signal
      });
      if (!uploadReq.ok) throw new Error(`Не получен URL загрузки: ${uploadReq.status}`);
      const uploadUrl = (await uploadReq.json()).href;
      const putRes = await fetch(uploadUrl, { method: 'PUT', body: blob, signal: abortController?.signal });
      if (!putRes.ok) throw new Error(`Ошибка загрузки на Диск: ${putRes.status}`);
      log(`✅ Файл сохранён: ${fullPath}`);
    }

    // Рекурсивная обработка публичной папки
    async function processFolder(publicKey, targetPath) {
      if (!isRunning) throw new Error('Остановлено пользователем');
      log(`📂 Обработка папки: ${targetPath}`);
      await ensureFolder(targetPath);
      let offset = 0;
      const limit = 1000;
      let hasMore = true;
      while (hasMore && isRunning) {
        const url = `${API}/resources/public?public_key=${publicKey}&limit=${limit}&offset=${offset}`;
        const resp = await fetch(url, { headers: { 'Authorization': `OAuth ${TOKEN}` }, signal: abortController?.signal });
        if (!resp.ok) throw new Error(`Не удалось получить содержимое папки: ${resp.status}`);
        const data = await resp.json();
        const items = data._embedded?.items || [];
        for (const item of items) {
          if (!isRunning) throw new Error('Остановлено');
          if (item.type === 'file') {
            await saveFile(item.public_key, targetPath, item.name);
          } else if (item.type === 'dir') {
            await processFolder(item.public_key, `${targetPath}/${item.name}`);
          }
        }
        hasMore = !!data._embedded?.next;
        offset += limit;
      }
    }

    // Главная функция для обработки одной публичной ссылки
    async function processPublicLink(publicKey, targetPath) {
      const metaResp = await fetch(`${API}/resources/public?public_key=${publicKey}`, {
        headers: { 'Authorization': `OAuth ${TOKEN}` },
        signal: abortController?.signal
      });
      if (!metaResp.ok) throw new Error(`Не удалось получить информацию о ресурсе: ${metaResp.status}`);
      const meta = await metaResp.json();
      if (meta.type === 'file') {
        await saveFile(publicKey, targetPath, meta.name);
      } else if (meta.type === 'dir') {
        await processFolder(publicKey, targetPath);
      } else {
        throw new Error('Неизвестный тип ресурса');
      }
    }

    async function startProcess() {
      const raw = document.getElementById('links-input').value.trim();
      if (!raw) return alert('Вставьте ссылки');
      const urls = raw.split(/\n/).map(u => u.trim()).filter(Boolean);
      const keys = urls.map(extractPublicKey).filter(Boolean);
      if (keys.length === 0) return alert('Не удалось распознать ссылки. Убедитесь, что ссылки ведут на yadi.sk или disk.yandex.ru');

      isRunning = true;
      abortController = new AbortController();
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-stop').style.display = 'block';
      log(`🚀 Найдено ресурсов: ${keys.length}`);

      let success = 0;
      for (let i = 0; i < keys.length; i++) {
        if (!isRunning) break;
        document.getElementById('progress-text').textContent = `${i + 1}/${keys.length}`;
        document.getElementById('progress-fill').style.width = `${(i / keys.length) * 100}%`;
        try {
          await processPublicLink(keys[i], TARGET_FOLDER);
          success++;
        } catch (e) {
          if (e.message === 'Остановлено пользователем') {
            log('⏹ Процесс прерван');
            break;
          }
          log(`❌ Ошибка #${i+1}: ${e.message}`);
        }
        await new Promise(r => setTimeout(r, 500));
      }
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('progress-text').textContent = `✅ Готово: ${success}/${keys.length}`;
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-stop').style.display = 'none';
      isRunning = false;
    }

    function stopProcess() {
      isRunning = false;
      if (abortController) abortController.abort();
      log('⏹ Остановка по запросу');
    }
  </script>
</body>
</html>
