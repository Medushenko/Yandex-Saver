<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fc3f1d">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Yandex Saver — Версия 5.6.Copilot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
<header>
    <div class="header">
        <h1>🗂 Yandex Saver</h1>
        <span class="badge">v5.6.Copilot</span>
    </div>
</header>
<main>
    <section>
        <h2>Авторизация</h2>
        <form id="auth-form">
            <label for="username">Логин:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Войти</button>
        </form>
        <div id="auth-error" class="error-message" style="display: none;">Ошибка авторизации. Попробуйте снова.</div>
    </section>
    <section>
        <h2>Выбор папки</h2>
        <label for="folder-path">Путь к папке:</label>
        <input type="text" id="folder-path" placeholder="/saved-materials" required>
        <button id="folder-validate">Проверить и создать</button>
        <div id="folder-status" class="status-message"></div>
    </section>
    <section>
        <h2>Файлы и ссылки</h2>
        <textarea id="links-input" placeholder="Вставьте ссылки для обработки"></textarea>
        <div class="file-actions">
            <button id="upload-files">Загрузить ссылки</button>
        </div>
        <div class="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="progress-text">Прогресс: 0%</p>
        </div>
    </section>
</main>
<footer>
    <p>Yandex Saver — Версия 5.6.Copilot</p>
</footer>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Авторизация
        const authForm = document.getElementById("auth-form");
        const authError = document.getElementById("auth-error");
        
        authForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            // Замените логикой проверки авторизации
            if (username === "test" && password === "password") {
                alert("Авторизация успешна!");
                authError.style.display = "none";
            } else {
                authError.style.display = "block";
            }
        });

        // Проверка папки
        const folderValidate = document.getElementById("folder-validate");
        folderValidate.addEventListener("click", () => {
            const folderPath = document.getElementById("folder-path").value.trim();
            if (folderPath) {
                document.getElementById("folder-status").textContent = `Папка '${folderPath}' готова!`;
            } else {
                document.getElementById("folder-status").textContent = "Укажите путь к папке.";
            }
        });

        // Работа с файлами
        const uploadFiles = document.getElementById("upload-files");
        uploadFiles.addEventListener("click", () => {
            const linksInput = document.getElementById("links-input").value.trim();
            if (linksInput) {
                alert(`Получены ссылки:\n${linksInput}`);
                document.getElementById("progress-fill").style.width = "100%";
                document.getElementById("progress-text").textContent = "Прогресс: 100%";
            } else {
                alert("Пожалуйста, вставьте хотя бы одну ссылку.");
            }
        });
    });
</script>
</body>
</html>
