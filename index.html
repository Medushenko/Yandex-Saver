<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex Saver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yandex Saver</h1>
        <p>Сохранение файлов и папок с публичных ссылок на ваш Яндекс.Диск</p>

        <div id="auth-section">
            <button id="auth-button">🔑 Авторизоваться</button>
            <div id="auth-status">Диск не подключён</div>
        </div>

        <div id="folder-section" style="display:none;">
            <h2>📁 Папка назначения</h2>
            <input type="text" id="folder-path" placeholder="Введите путь к папке">
            <button id="create-folder">Проверить и создать</button>
        </div>

        <div id="links-section" style="display:none;">
            <h2>🚀 Вставьте ссылки</h2>
            <textarea id="links-input" rows="5" placeholder="Вставьте ссылки"></textarea>
            <button id="start-button">Начать сохранение</button>
            <button id="stop-button">Остановить</button>
        </div>

        <div class="status" id="status">
            📋 Статус: Ожидание
        </div>
    </div>

    <script>
        const CLIENT_ID = 'ВАШ_CLIENT_ID'; // Замените на ваш ID
        const SCOPE = 'disk.info disk.write offline';
        
        const authButton = document.getElementById('auth-button');
        const authStatus = document.getElementById('auth-status');
        
        authButton.addEventListener('click', () => {
            const authUrl = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${CLIENT_ID}&scope=${SCOPE}`;
            window.location.href = authUrl;
        });

        // Функция проверки токена (примерная реализация)
        function checkToken() {
            // Здесь должна быть логика проверки токена
            // Например, из localStorage или URL
            const token = getTokenFromUrl();
            if (token) {
                authStatus.textContent = 'Диск подключён';
                authStatus.style.color = 'green';
                showFolderSection();
            }
        }

        function getTokenFromUrl() {
            // Простая реализация получения токена из URL
            const urlParams = new URLSearchParams(window.location.hash.substring(1));
            return urlParams.get('access_token');
        }

        function showFolderSection() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('folder-section').style.display = 'block';
        }

        // Инициализация при загрузке страницы
        window.addEventListener('load', () => {
            checkToken();
        });
    </script>
</body>
</html>
