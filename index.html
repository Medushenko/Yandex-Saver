<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex Saver - Извлечение и сохранение ссылок</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Yandex Saver</h1>
        
        <div class="auth-section">
            <button id="authBtn" class="btn">Авторизоваться в Яндекс</button>
            <span id="authStatus"></span>
        </div>

        <div class="input-section">
            <h2>Вставьте текст с ссылками:</h2>
            <textarea id="inputText" placeholder="Вставьте сюда текст с внешними ссылками..."></textarea>
            <button id="extractBtn" class="btn" disabled>Извлечь ссылки</button>
        </div>

        <div class="links-section">
            <h2>Найденные ссылки:</h2>
            <div id="linksList"></div>
            <button id="downloadBtn" class="btn" disabled>Скачать на Яндекс Диск</button>
        </div>

        <div class="status-section">
            <h2>Статус выполнения:</h2>
            <iframe id="statusFrame" class="status-frame"></iframe>
            <button id="copyLogBtn" class="btn">Копировать лог</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
