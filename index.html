<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex Saver v5.5.1</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #fff;
            --primary: #fc3f1d;
            --text: #333;
            --text-light: #666;
            --border: #e0e0e0;
            --success: #4caf50;
            --error: #f44336;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 28px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
        .header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .header h1 { font-size: 1.6rem; }
        .badge { background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .step { display: none; }
        .step.active { display: block; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; margin-bottom: 14px; font-size: 16px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        button { background: var(--primary); color: #fff; border: none; padding: 14px 20px; border-radius: 12px; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; font-weight: 500; }
        button:hover { background: #e6300f; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.secondary { background: #666; }
        .hint { font-size: 0.9rem; color: var(--text-light); margin-bottom: 14px; }
        .user-info { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 12px; margin-bottom: 20px; }
        .status-panel { background: #f8f9fa; padding: 14px; border-radius: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .disk-info { display: flex; gap: 16px; margin-left: auto; font-size: 0.9rem; color: var(--text-light); }
        .folder-browser { background: #fff; border: 2px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 14px; max-height: 320px; overflow-y: auto; }
        .folder-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .folder-item:hover { background: #f8f9fa; }
        .log { background: #0d1117; color: #7ee787; padding: 16px; border-radius: 12px; font-family: monospace; font-size: 0.85rem; height: 280px; overflow-y: auto; margin-top: 16px; display: none; white-space: pre-wrap; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
        .report-section { margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-radius: 10px; }
        .report-header { background: var(--primary); color: white; padding: 12px; border-radius: 10px; margin-bottom: 16px; }
        .file-size { color: var(--text-light); font-size: 0.85em; float: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="header" onclick="location.reload()">
        <h1>🗂 Yandex Saver</h1>
        <span class="badge">v5.5.1</span>
    </div>
    <div class="hint">Сохранение файлов с надёжной авторизацией</div>

    <div id="user-block" class="user-info" style="display:none">
        <span>✅ <strong>Диск подключён</strong></span>
        <button onclick="logout()" style="width:auto;padding:8px 16px;background:var(--error);margin:0">Выйти</button>
    </div>

    <div id="step-auth" class="step active">
        <label>🔐 Подключите Яндекс.Диск</label>
        <button id="authBtn">🔑 Авторизоваться</button>
        <div id="auth-message"></div>
    </div>

    <div id="step-folder" class="step">
        <label>📁 Папка назначения</label>
        <div style="display:flex;gap:10px">
            <input type="text" id="folder-input" value="/saved-materials" style="flex:1">
            <button id="browseBtn" style="width:auto">📂 Обзор</button>
        </div>
        <div id="folder-browser" class="folder-browser" style="display:none"></div>
        <button id="btn-next" style="display:none;margin-top:10px" onclick="goToStep('step-links')">➡️ Далее</button>
    </div>

    <div id="step-links" class="step">
        <label>🔗 Вставьте ссылки</label>
        <textarea id="links-input" rows="5" placeholder="https://disk.yandex.ru/d/..."></textarea>
        <div style="background:#f8f9fa;padding:12px;border-radius:10px;margin:10px 0">
            <span>🔍 <strong>Ссылок:</strong> <span id="links-count">0</span></span>
        </div>
        <button id="btn-start" onclick="startProcess()">🚀 Начать сохранение</button>
        <button id="btn-stop" class="secondary" style="display:none" onclick="stopProcess()">⏹ Остановить</button>
        <button id="btn-report" class="secondary" style="display:none;background:var(--success)" onclick="showReport()">📋 Отчёт</button>
    </div>

    <div class="status-panel">
        <span>📋 <span id="status">Ожидание</span></span>
        <div class="disk-info">
            <span>💾 <strong id="disk-free">—</strong></span>
        </div>
    </div>
    
    <div id="log" class="log"></div>
    <button id="copyLog" class="secondary" style="display:none;margin-top:12px" onclick="copyLog()">📋 Копировать лог</button>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <div style="display:flex;justify-content:space-between;margin-bottom:16px">
            <h3>📋 Отчёт</h3>
            <button onclick="closeReport()" style="background:none;border:none;font-size:1.5em;cursor:pointer;color:#666;width:auto;padding:0">×</button>
        </div>
        <div id="reportBody"></div>
    </div>
</div>

<script>
const APP_VERSION = '5.5.1';
const CLIENT_ID = 'a0731d71573f4d0a8e40b05760f1badb';
const REDIRECT_URI = 'https://medushenko.github.io/Yandex-Saver/';
const API = 'https://cloud-api.yandex.net/v1/disk';

let TOKEN = '';
let TARGET_FOLDER = '/saved-materials';
let isRunning = false;
let abortController = null;
let popup = null;
let popupTimer = null;
let processedPublicPaths = new Set();

const stats = {
    totalLinks: 0, foldersProcessed: 0, totalFiles: 0, totalSize: 0,
    successCount: 0, successSize: 0, successFiles: [],
    duplicateCount: 0, duplicateSize: 0, duplicateFiles: [],
    errorCount: 0, errorSize: 0, errorFiles: []
};

let logs = [];

const el = id => document.getElementById(id);

function addLog(msg) {
    const time = new Date().toLocaleTimeString('ru-RU');
    const line = `[${time}] ${msg}`;
    logs.push(line);
    const logEl = el('log');
    logEl.style.display = 'block';
    logEl.textContent += line + '\n';
    logEl.scrollTop = logEl.scrollHeight;
}

function updateStatus(msg) { el('status').textContent = msg; }

function showMessage(type, text) {
    const div = document.createElement('div');
    div.style.cssText = `padding:14px;border-radius:12px;margin:14px 0;border-left:4px solid ${type==='error'?'#f44336':'#4caf50'};background:${type==='error'?'#ffebee':'#e8f5e9'};color:${type==='error'?'#c62828':'#2e7d32'};`;
    div.textContent = text;
    el('auth-message').appendChild(div);
    setTimeout(() => div.remove(), 5000);
}

function goToStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    el(id).classList.add('active');
}

function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '0 Б';
    const k = 1024;
    const sizes = ['Б', 'КБ', 'МБ', 'ГБ', 'ТБ'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function normalizePath(p) {
    if (!p) return '/';
    return p.replace(/\/+/g, '/').replace(/\/$/, '') || '/';
}

function getStoredToken() {
    try {
        let t = sessionStorage.getItem('ydisk_token');
        if (t && t.length > 20) return t;
        t = localStorage.getItem('ydisk_token');
        if (t && t.length > 20) {
            sessionStorage.setItem('ydisk_token', t);
            return t;
        }
    } catch(e) {}
    return '';
}

function storeToken(token) {
    try {
        sessionStorage.setItem('ydisk_token', token);
        localStorage.setItem('ydisk_token', token);
    } catch(e) {}
}

TOKEN = getStoredToken();

el('authBtn').onclick = function() {
    updateStatus('🔐 Открытие окна...');
    const url = `https://oauth.yandex.ru/authorize?response_type=token&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    popup = window.open(url, 'YandexAuth', 'width=520,height=700');
    if (!popup) { showMessage('error', '❌ Разрешите всплывающие окна'); return; }
    window.addEventListener('message', handlePopupMessage);
    popupTimer = setTimeout(() => {
        if (popup && !popup.closed) popup.close();
        window.removeEventListener('message', handlePopupMessage);
    }, 5 * 60 * 1000);
};

function handlePopupMessage(event) {
    if (event.origin !== window.location.origin || !event.data?.token) return;
    if (popupTimer) { clearTimeout(popupTimer); popupTimer = null; }
    addLog(`📨 Токен получен`);
    verifyToken(event.data.token);
    if (popup && !popup.closed) popup.close();
    window.removeEventListener('message', handlePopupMessage);
}

if (window.location.hash.includes('access_token=')) {
    const match = window.location.hash.match(/access_token=([^&]+)/);
    if (match && match[1]) {
        const token = decodeURIComponent(match[1]);
        addLog(`🔗 Возврат из OAuth`);
        verifyToken(token);
        history.replaceState(null, '', window.location.pathname);
    }
}

async function verifyToken(token) {
    updateStatus('✅ Проверка...');
    try {
        const res = await fetch(`${API}/`, { headers: { 'Authorization': `OAuth ${token}` }, cache: 'no-store' });
        if (res.ok) {
            TOKEN = token;
            storeToken(TOKEN);
            addLog('🔑 Токен принят');
            onAuthSuccess();
        } else {
            addLog(`❌ Токен отклонён: ${res.status}`);
            logout();
        }
    } catch(e) {
        addLog(`❌ Ошибка: ${e.message}`);
        logout();
    }
}

function onAuthSuccess() {
    showMessage('success', '✅ Яндекс.Диск подключён');
    el('user-block').style.display = 'flex';
    updateStatus('Авторизация успешна');
    goToStep('step-folder');
    fetchDiskInfo();
}

function logout() {
    TOKEN = '';
    try { sessionStorage.removeItem('ydisk_token'); localStorage.removeItem('ydisk_token'); } catch(e) {}
    el('user-block').style.display = 'none';
    el('log').innerHTML = '';
    el('log').style.display = 'none';
    logs = [];
    updateStatus('🔓 Вышли');
    goToStep('step-auth');
    addLog('👋 Сессия завершена');
}

async function fetchDiskInfo() {
    try {
        const res = await fetch(`${API}/`, { headers: { 'Authorization': `OAuth ${TOKEN}` } });
        if (res.ok) {
            const d = await res.json();
            const free = d.free_space || (d.total_space - d.used_space);
            el('disk-free').textContent = formatBytes(free);
        }
    } catch(e) { addLog(`⚠️ Ошибка: ${e.message}`); }
}

el('browseBtn').onclick = async function() {
    let p = el('folder-input').value.trim() || '/';
    if (!p.startsWith('/')) p = '/' + p;
    await loadFolderContents(normalizePath(p));
    el('folder-browser').style.display = 'block';
};

async function loadFolderContents(path) {
    const div = el('folder-browser');
    div.innerHTML = '<div style="text-align:center;padding:24px">⏳ Загрузка...</div>';
    try {
        const res = await fetch(`${API}/resources?path=${encodeURIComponent(path)}&limit=1000`, { headers: { 'Authorization': `OAuth ${TOKEN}` } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const items = (data._embedded?.items || []).filter(i => i.type === 'dir');
        div.innerHTML = '';
        if (path !== '/') {
            const up = document.createElement('div');
            up.className = 'folder-item';
            up.textContent = '📁 .. (вверх)';
            up.onclick = () => loadFolderContents(normalizePath(path.substring(0, path.lastIndexOf('/')) || '/'));
            div.appendChild(up);
        }
        items.forEach(f => {
            const d = document.createElement('div');
            d.className = 'folder-item';
            d.textContent = `📁 ${f.name}`;
            d.onclick = () => loadFolderContents(normalizePath(path === '/' ? `/${f.name}` : `${path}/${f.name}`));
            div.appendChild(d);
        });
        const sel = document.createElement('button');
        sel.textContent = `✅ Выбрать: ${path}`;
        sel.style.marginTop = '16px';
        sel.style.background = 'var(--success)';
        sel.onclick = () => {
            TARGET_FOLDER = normalizePath(path);
            el('folder-input').value = TARGET_FOLDER;
            div.style.display = 'none';
            el('btn-next').style.display = 'block';
            addLog(`📁 Выбрана: ${TARGET_FOLDER}`);
        };
        div.appendChild(sel);
    } catch(e) {
        div.innerHTML = `<div style="color:var(--error);padding:16px">❌ ${e.message}</div>`;
    }
}

function extractLinks(text) {
    const regex = /https?:\/\/(?:disk\.yandex\.(?:ru|com)|yadi\.sk)\/[^\s<>"']+/gi;
    const found = text.match(regex) || [];
    return [...new Set(found)];
}

el('links-input').oninput = function() {
    const links = extractLinks(this.value);
    stats.totalLinks = links.length;
    el('links-count').textContent = links.length;
};

function generateReport() {
    let html = `<div class="report-header"><strong>📊 Статистика v${APP_VERSION}</strong><br>`;
    html += `Ссылок: ${stats.totalLinks} | Файлов: ${stats.totalFiles}<br>`;
    html += `Успешно: ${stats.successCount} | Дубли: ${stats.duplicateCount} | Ошибки: ${stats.errorCount}</div>`;
    if (stats.errorFiles.length > 0) {
        html += `<div class="report-section"><h3>❌ Ошибки</h3><ul>`;
        stats.errorFiles.forEach((f, i) => { html += `<li>${i+1}. ${f.name}<br><small>${f.reason}</small></li>`; });
        html += `</ul></div>`;
    }
    if (stats.successFiles.length > 0) {
        html += `<div class="report-section"><h3>✅ Успешно</h3><ul>`;
        stats.successFiles.forEach(f => { html += `<li>${f.name}</li>`; });
        html += `</ul></div>`;
    }
    return html;
}

function showReport() { el('reportBody').innerHTML = generateReport(); el('reportModal').style.display = 'flex'; }
function closeReport() { el('reportModal').style.display = 'none'; }

async function ensureFolderExists(path) {
    const np = normalizePath(path);
    if (np === '/') return;
    try { await fetch(`${API}/resources?path=${encodeURIComponent(np)}`, { headers: { 'Authorization': `OAuth ${TOKEN}` } }); }
    catch {
        const parent = normalizePath(np.substring(0, np.lastIndexOf('/')) || '/');
        await ensureFolderExists(parent);
        await fetch(`${API}/resources?path=${encodeURIComponent(np)}`, { method: 'PUT', headers: { 'Authorization': `OAuth ${TOKEN}` } });
        addLog(`📁 Создана: ${np}`);
    }
}

function getDirFromPublicPath(filePath) {
    if (!filePath || filePath === '/') return '';
    const parts = filePath.split('/').filter(p => p && p.trim());
    return parts.length <= 1 ? '' : parts.slice(0, -1).join('/');
}

async function fileExistsAtPath(fullPath) {
    try {
        const res = await fetch(`${API}/resources?path=${encodeURIComponent(fullPath)}`, { headers: { 'Authorization': `OAuth ${TOKEN}` } });
        return res.status === 200;
    } catch { return false; }
}

class Throttler {
    constructor(maxPerSec = 3) { this.max = maxPerSec; this.timestamps = []; }
    async wait() {
        const now = Date.now();
        this.timestamps = this.timestamps.filter(t => now - t < 1000);
        if (this.timestamps.length >= this.max) {
            const oldest = Math.min(...this.timestamps);
            await new Promise(r => setTimeout(r, Math.max(0, 1000 - (now - oldest) + 100)));
        }
        this.timestamps.push(Date.now());
    }
}
const throttler = new Throttler(3);

async function savePublicFile(publicKey, filePathInPublic, targetPath, fileName, sourceUrl) {
    if (!isRunning) throw new Error('Остановлено');
    const fullPath = normalizePath(`${targetPath}/${fileName}`);
    if (await fileExistsAtPath(fullPath)) {
        addLog(`⏭ Уже: ${fileName}`);
        stats.duplicateCount++;
        stats.duplicateFiles.push({ name: fileName, url: sourceUrl, size: 0 });
        return { skipped: true };
    }
    updateStatus(`💾 ${fileName}`);
    addLog(`⬇️ Сохраняю: ${fileName}`);
    const params = new URLSearchParams({ public_key: publicKey, path: filePathInPublic, save_path: normalizePath(targetPath), name: fileName });
    const response = await fetch(`${API}/public/resources/save-to-disk?${params}`, { method: 'POST', headers: { 'Authorization': `OAuth ${TOKEN}` } });
    if (response.status === 202 || response.ok) {
        addLog(`✅ Сохранено: ${fileName}`);
        stats.successCount++;
        stats.successFiles.push({ name: fileName, url: `${API}/resources?path=${encodeURIComponent(fullPath)}`, size: 0 });
        return { saved: true };
    }
    const text = await response.text().catch(() => '');
    stats.errorCount++;
    stats.errorFiles.push({ name: fileName, url: sourceUrl, reason: `API ${response.status}: ${text.slice(0,100)}`, size: 0 });
    throw new Error(`API ${response.status}`);
}

async function processPublicFolder(publicKey, targetBasePath, publicFolderName, sourceUrl) {
    if (!isRunning) throw new Error('Остановлено');
    const rootTargetPath = normalizePath(`${targetBasePath}/${publicFolderName}`);
    addLog(`📁 Обработка: "${publicFolderName}"`);
    updateStatus(`📂 ${publicFolderName}`);
    stats.foldersProcessed++;
    await ensureFolderExists(rootTargetPath);
    let url = `${API}/public/resources?public_key=${encodeURIComponent(publicKey)}&limit=1000`;
    while (url && isRunning) {
        await throttler.wait();
        const resp = await fetch(url, { signal: abortController?.signal });
        if (!resp.ok) throw new Error(`Ошибка: ${resp.status}`);
        const data = await resp.json();
        const items = data._embedded?.items || data.items || [];
        for (const item of items) {
            if (!isRunning) throw new Error('Остановлено');
            if (processedPublicPaths.has(item.path)) continue;
            processedPublicPaths.add(item.path);
            if (item.type === 'file') {
                stats.totalFiles++;
                const dirInPublic = getDirFromPublicPath(item.path);
                const fileTargetPath = dirInPublic ? normalizePath(`${rootTargetPath}/${dirInPublic}`) : rootTargetPath;
                try { await savePublicFile(publicKey, item.path, fileTargetPath, item.name, sourceUrl); }
                catch (e) { addLog(`❌ Ошибка ${item.name}: ${e.message}`); }
            } else if (item.type === 'dir') {
                const relPath = item.path.startsWith('/') ? item.path.substring(1) : item.path;
                const itemTargetPath = normalizePath(`${rootTargetPath}/${relPath}`);
                await ensureFolderExists(itemTargetPath);
                const subUrl = `${API}/public/resources?public_key=${encodeURIComponent(publicKey)}&path=${encodeURIComponent(item.path)}&limit=1000`;
                await processSubFolderContents(subUrl, publicKey, rootTargetPath, sourceUrl);
            }
        }
        url = data._embedded?.next || data.next || null;
    }
}

async function processSubFolderContents(url, publicKey, rootTargetPath, sourceUrl) {
    if (!isRunning) return;
    await throttler.wait();
    const resp = await fetch(url, { signal: abortController?.signal });
    if (!resp.ok) throw new Error(`Ошибка: ${resp.status}`);
    const data = await resp.json();
    const items = data._embedded?.items || data.items || [];
    for (const item of items) {
        if (!isRunning) throw new Error('Остановлено');
        if (processedPublicPaths.has(item.path)) continue;
        processedPublicPaths.add(item.path);
        if (item.type === 'file') {
            stats.totalFiles++;
            const dirInPublic = getDirFromPublicPath(item.path);
            const fileTargetPath = dirInPublic ? normalizePath(`${rootTargetPath}/${dirInPublic}`) : rootTargetPath;
            try { await savePublicFile(publicKey, item.path, fileTargetPath, item.name, sourceUrl); }
            catch (e) { addLog(`❌ Ошибка ${item.name}: ${e.message}`); }
        } else if (item.type === 'dir') {
            const relPath = item.path.startsWith('/') ? item.path.substring(1) : item.path;
            const itemTargetPath = normalizePath(`${rootTargetPath}/${relPath}`);
            await ensureFolderExists(itemTargetPath);
            const subUrl = `${API}/public/resources?public_key=${encodeURIComponent(publicKey)}&path=${encodeURIComponent(item.path)}&limit=1000`;
            await processSubFolderContents(subUrl, publicKey, rootTargetPath, sourceUrl);
        }
    }
    const nextUrl = data._embedded?.next || data.next || null;
    if (nextUrl && isRunning) await processSubFolderContents(nextUrl, publicKey, rootTargetPath, sourceUrl);
}

async function processPublicLink(publicUrl, targetBasePath) {
    processedPublicPaths.clear();
    const metaResp = await fetch(`${API}/public/resources?public_key=${encodeURIComponent(publicUrl)}`, { signal: abortController?.signal });
    if (!metaResp.ok) {
        stats.errorCount++;
        stats.errorFiles.push({ name: '(корень)', url: publicUrl, reason: `Недоступна (${metaResp.status})`, size: 0 });
        throw new Error(`Недоступно (${metaResp.status})`);
    }
    const meta = await metaResp.json();
    if (meta.type === 'file') {
        addLog(`📄 Файл: ${meta.name}`);
        stats.totalFiles++;
        return (await savePublicFile(publicUrl, meta.path || `/${meta.name}`, targetBasePath, meta.name, publicUrl))?.skipped ? { skipped: true } : { saved: true };
    } else if (meta.type === 'dir' || meta._embedded?.items) {
        const publicFolderName = meta.name || 'Без имени';
        addLog(`📁 Папка: "${publicFolderName}"`);
        await processPublicFolder(publicUrl, targetBasePath, publicFolderName, publicUrl);
        return { saved: true };
    }
    throw new Error(`Неизвестный тип: ${meta.type}`);
}

async function startProcess() {
    stats.foldersProcessed = 0; stats.totalFiles = 0; stats.totalSize = 0;
    stats.successCount = 0; stats.successSize = 0; stats.successFiles = [];
    stats.duplicateCount = 0; stats.duplicateSize = 0; stats.duplicateFiles = [];
    stats.errorCount = 0; stats.errorSize = 0; stats.errorFiles = [];
    const raw = el('links-input').value.trim();
    if (!raw) { alert('⚠️ Вставьте ссылки'); return; }
    const links = extractLinks(raw);
    if (!links.length) { alert('❌ Нет ссылок'); return; }
    stats.totalLinks = links.length;
    if (!TARGET_FOLDER) TARGET_FOLDER = normalizePath(el('folder-input').value.trim() || '/saved-materials');
    await fetchDiskInfo();
    isRunning = true;
    abortController = new AbortController();
    processedPublicPaths.clear();
    el('btn-start').disabled = true;
    el('btn-stop').style.display = 'block';
    el('btn-report').style.display = 'none';
    addLog(`🚀 Старт: ${links.length} ссылок`);
    updateStatus(`⏳ 1/${links.length}`);
    await ensureFolderExists(TARGET_FOLDER);
    let success = 0, skipped = 0, errors = 0;
    for (let i = 0; i < links.length; i++) {
        if (!isRunning) break;
        updateStatus(`⏳ ${i+1}/${links.length}`);
        try {
            const result = await processPublicLink(links[i], TARGET_FOLDER);
            if (result?.skipped) skipped++; else success++;
            addLog(`✅ Ссылка #${i+1}`);
        } catch(e) {
            if (e.message === 'Остановлено') { addLog('⏹ Остановлено'); break; }
            errors++;
            addLog(`❌ #${i+1}: ${e.message}`);
        }
        await new Promise(r => setTimeout(r, 500));
    }
    updateStatus(`✅ Готово: ${success} сохранено`);
    isRunning = false;
    el('btn-start').disabled = false;
    el('btn-stop').style.display = 'none';
    if (stats.errorFiles.length > 0 || stats.successFiles.length > 0) el('btn-report').style.display = 'block';
    addLog(`🎉 Завершено: ${success} сохранено, ${skipped} дублей, ${errors} ошибок`);
    showMessage(errors === 0 ? 'success' : 'error', `✅ ${success} сохранено, ${errors} ошибок`);
}

function stopProcess() {
    isRunning = false;
    if (abortController) abortController.abort();
    addLog('⏹ Остановка...');
    updateStatus('⏹ Остановка...');
}

function copyLog() {
    if (!logs.length) { alert('📭 Лог пуст'); return; }
    navigator.clipboard.writeText(logs.join('\n')).then(() => addLog('📋 Лог скопирован'));
}

window.addEventListener('DOMContentLoaded', () => {
    if (TOKEN) {
        addLog('🔍 Токен найден');
        verifyToken(TOKEN).catch(e => { addLog(`⚠️ Ошибка: ${e.message}`); updateStatus('Не авторизован'); });
    } else {
        addLog('⚠️ Требуется авторизация');
        updateStatus('Не авторизован');
    }
    el('copyLog').style.display = 'block';
});
</script>
