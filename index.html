<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex Saver v5.5.1</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #fff;
            --primary: #fc3f1d;
            --primary-hover: #e6300f;
            --text: #333;
            --text-light: #666;
            --border: #e0e0e0;
            --success: #4caf50;
            --error: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card);
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .header .badge {
            background: var(--primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            margin-bottom: 14px;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 500;
        }
        button:hover {
            background: var(--primary-hover);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button.secondary {
            background: #666;
        }
        .hint {
            font-size: .9rem;
            color: var(--text-light);
            margin-bottom: 14px;
        }
        .error-box {
            background: #ffebee;
            color: #c62828;
            padding: 14px;
            border-radius: 12px;
            margin: 14px 0;
            border-left: 4px solid var(--error);
        }
        .success-box {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 14px;
            border-radius: 12px;
            margin: 14px 0;
            border-left: 4px solid var(--success);
        }
        .log {
            background: #0d1117;
            color: #7ee787;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: .85rem;
            height: 280px;
            overflow-y: auto;
            margin-top: 16px;
            display: none;
            white-space: pre-wrap;
        }
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .status-panel {
            background: #f8f9fa;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .status-panel span {
            font-weight: 600;
            color: var(--primary);
        }
        .disk-info {
            display: flex;
            gap: 16px;
            margin-left: auto;
            font-size: .9rem;
            color: var(--text-light);
        }
        .folder-browser {
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-top: 14px;
            max-height: 320px;
            overflow-y: auto;
        }
        .folder-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .folder-item:hover {
            background: #f8f9fa;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .report-section {
            margin-bottom: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
        }
